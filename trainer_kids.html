<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Youth Academy | Learning Lab for Kids & Teens</title>
  <style>
    :root{

      --card:#ffffff;
      --green:#0f766e;

      --shadow:0 18px 45px rgba(15,23,42,.10);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--slate);background:var(--bg)}
    button,input,select,textarea{font-family:inherit}
    a{color:inherit;text-decoration:none}
    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:290px;background:linear-gradient(180deg,var(--navy),#081827);color:#fff;display:flex;flex-direction:column;flex-shrink:0;box-shadow:8px 0 24px rgba(15,23,42,.18);z-index:20}
    .brand{padding:24px 22px;border-bottom:1px solid rgba(255,255,255,.12)}
    .brand-title{font-size:20px;font-weight:800;letter-spacing:.2px}.brand-sub{font-size:12px;color:#b9d7f6;margin-top:6px;line-height:1.4}
    .nav{padding:18px 12px;overflow-y:auto}.nav button{width:100%;border:0;background:transparent;color:#c7def5;text-align:left;padding:12px 14px;border-radius:12px;margin:3px 0;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:10px}.nav button:hover{background:rgba(255,255,255,.08);color:white}.nav button.active{background:#fff;color:var(--navy)}
    .sidebar-footer{margin-top:auto;padding:18px 22px;border-top:1px solid rgba(255,255,255,.12);font-size:12px;color:#b9d7f6;line-height:1.45}.sidebar-footer strong{display:block;color:#fff;font-size:14px;margin-bottom:4px}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}.topbar{height:72px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 24px;flex-shrink:0;box-shadow:0 6px 18px rgba(15,23,42,.04)}
    .hamb{display:none;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;cursor:pointer}.search-wrap{position:relative;flex:1;max-width:820px}.search-wrap input{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:14px;padding:13px 16px 13px 44px;font-size:14px;outline:none}.search-wrap input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.10)}.search-icon{position:absolute;left:16px;top:12px;color:var(--muted)}
    .filters{display:flex;gap:10px;align-items:center}.filters select{border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 12px;color:#334155;font-weight:650}.primary-btn,.soft-btn,.danger-btn{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer}.primary-btn{background:var(--navy);color:#fff}.primary-btn:hover{background:#081827}.soft-btn{background:#eef6ff;color:var(--navy);border:1px solid #cfe2ff}.danger-btn{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3}
    .content{flex:1;overflow:auto;padding:28px}.hero{background:linear-gradient(135deg,var(--navy),#214f78);border-radius:28px;color:white;padding:32px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;background:rgba(255,255,255,.10);border-radius:50%}.hero h1{margin:0;font-size:34px;line-height:1.08;letter-spacing:-.6px}.hero p{max-width:900px;line-height:1.65;color:#d9ebff;font-size:15px}.hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:22px}.hero-stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:16px}.hero-stat strong{font-size:28px;display:block}.hero-stat span{font-size:12px;color:#cfe7ff}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin:30px 0 14px}.section-head h2{margin:0;font-size:24px;letter-spacing:-.4px}.section-head p{margin:7px 0 0;color:var(--muted);line-height:1.55;max-width:880px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 10px 24px rgba(15,23,42,.04);transition:.15s ease}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.card h3{margin:10px 0 8px;font-size:18px;letter-spacing:-.2px}.card p{color:#475569;line-height:1.55;margin:0 0 14px}.card-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f1f5f9;padding-top:13px;margin-top:12px;color:#64748b;font-size:12px}.tag-row{display:flex;flex-wrap:wrap;gap:7px}.tag{display:inline-flex;align-items:center;border-radius:999px;font-size:11px;font-weight:800;padding:6px 9px;border:1px solid var(--line);background:#f8fafc;color:#334155}.tag.age{background:var(--sky);color:#1e3a8a;border-color:#bfdbfe}.tag.topic{background:var(--mint);color:#065f46;border-color:#a7f3d0}.tag.level{background:var(--amber);color:#92400e;border-color:#fde68a}.tag.safety{background:var(--rose);color:#9f1239;border-color:#fecdd3}.tag.done{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
    .open-btn{border:0;background:transparent;color:var(--blue);font-weight:900;cursor:pointer}.open-btn:hover{text-decoration:underline}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.04)}.panel h3{margin-top:0}.rich-text{line-height:1.68;color:#334155}.rich-text strong{color:#0f172a}.callout{border-radius:20px;padding:18px;background:#f8fafc;border:1px solid var(--line);line-height:1.6}.callout.blue{background:#eef6ff;border-color:#cfe2ff}.callout.green{background:#ecfdf5;border-color:#a7f3d0}.callout.amber{background:#fffbeb;border-color:#fde68a}.callout.rose{background:#fff1f2;border-color:#fecdd3}.progress-card{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.bar{height:11px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:8px}.bar > div{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#0f766e);border-radius:999px}.kpi{font-size:32px;font-weight:900;letter-spacing:-.5px}.list{margin:0;padding-left:18px;color:#334155;line-height:1.75}.step-list{counter-reset:step;list-style:none;margin:0;padding:0;display:grid;gap:10px}.step-list li{position:relative;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:13px 14px 13px 48px;line-height:1.5}.step-list li:before{counter-increment:step;content:counter(step);position:absolute;left:14px;top:13px;background:var(--navy);color:#fff;width:23px;height:23px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:900}.prompt-box{background:#0b1220;color:#e2e8f0;border-radius:18px;padding:16px;line-height:1.6;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:12.5px}.copy-btn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer;color:#334155}.copy-btn:hover{border-color:var(--blue);color:var(--blue)}
    .modal-overlay{position:fixed;inset:0;background:rgba(2,6,23,.70);display:none;align-items:center;justify-content:center;padding:22px;z-index:60}.modal{width:min(1120px,100%);max-height:91vh;overflow:auto;background:#fff;border-radius:28px;box-shadow:0 28px 90px rgba(0,0,0,.35)}.modal-head{background:linear-gradient(135deg,var(--navy),#24587f);color:#fff;padding:28px}.modal-body{padding:24px}.modal-close{position:fixed;right:28px;top:24px;border:0;background:#fff;color:#0f172a;border-radius:999px;width:42px;height:42px;font-size:22px;font-weight:800;cursor:pointer}.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.hidden{display:none!important}.empty{padding:40px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:22px}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden;border:1px solid var(--line)}.table th,.table td{border-bottom:1px solid var(--line);text-align:left;padding:12px;vertical-align:top}.table th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:#f8fafc;color:#475569}.table td{font-size:13px;color:#334155;line-height:1.5}
    .resource-card a{color:var(--blue);font-weight:900}.resource-card .source{font-size:12px;color:#64748b}.resource-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.resource-link{display:block;border:1px solid var(--line);border-radius:16px;padding:13px;background:#f8fafc;line-height:1.45}.resource-link:hover{border-color:#bfdbfe;background:#eff6ff}.resource-link strong{display:block;color:var(--navy);font-size:13px;margin-bottom:4px}.resource-link span{display:block;color:#64748b;font-size:12px}.lab-block{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;margin:16px 0}.lab-block h3{margin:0 0 10px}.prompt-stack{display:grid;gap:14px}.prompt-unit{border:1px solid var(--line);border-radius:18px;padding:14px;background:#f8fafc}.prompt-unit h4{margin:0 0 8px;color:var(--navy)}.mission-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.mini-card{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px}.mini-card strong{display:block;color:var(--navy);margin-bottom:6px}.mini-card span{font-size:12px;color:#475569;line-height:1.45}.rubric{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.rubric div{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:12px;line-height:1.45}.resource-pill-row{display:flex;flex-wrap:wrap;gap:8px}.resource-pill{border:1px solid #bfdbfe;background:#eff6ff;color:#1e3a8a;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:800}.fixed-example{border-left:4px solid var(--blue);background:#eff6ff;padding:14px;border-radius:14px;line-height:1.6;color:#1e3a8a}.game-panel{background:linear-gradient(135deg,#102a43,#1d4f72);color:white;border-radius:24px;padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden}.game-panel:after{content:"";position:absolute;right:-55px;top:-55px;width:170px;height:170px;border-radius:999px;background:rgba(255,255,255,.10)}.game-panel h3{margin:0 0 8px}.game-panel p{color:#d9ebff;line-height:1.55;margin:0}.xp-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;margin-top:14px}.xp-number{font-size:28px;font-weight:900;letter-spacing:-.4px}.level-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}.badge-shelf{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid #bfdbfe;background:#eff6ff;color:#1e3a8a;padding:8px 10px;font-size:12px;font-weight:900}.badge.locked{background:#f8fafc;color:#94a3b8;border-color:#e2e8f0}.quest-map{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}.quest{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 10px 24px rgba(15,23,42,.04);position:relative}.quest strong{display:block;color:var(--navy);margin-bottom:6px}.quest span{display:block;font-size:12px;color:#64748b;line-height:1.45}.quest.done{border-color:#99f6e4;background:#ecfdf5}.quest .quest-xp{margin-top:10px;color:#0f766e;font-size:12px;font-weight:900}.reward-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.reward{border:1px solid #fde68a;background:#fffbeb;color:#92400e;border-radius:999px;padding:7px 9px;font-size:11px;font-weight:900}.rank-card{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px}.rank-card strong{display:block;color:var(--navy);margin-bottom:6px}.video-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 24px rgba(15,23,42,.04)}.video-card h3{margin:10px 0 8px}.video-card p{color:#475569;line-height:1.55}.video-card .watch{display:inline-flex;margin-top:10px;border-radius:12px;background:#eef6ff;border:1px solid #cfe2ff;color:var(--navy);font-weight:900;padding:10px 12px}.learning-path{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.learning-path .mini-card{min-height:130px}.celebrate{animation:pulseReward .65s ease}@keyframes pulseReward{0%{transform:scale(1)}45%{transform:scale(1.03)}100%{transform:scale(1)}}.mobile-overlay{display:none}.pill-menu{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 20px}.pill-menu button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;color:#334155;cursor:pointer}.pill-menu button:hover{border-color:#bfdbfe;background:#eff6ff}.small{font-size:12px;color:#64748b;line-height:1.5}.divider{height:1px;background:var(--line);margin:18px 0}.print-only{display:none}.age-note{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.age-note .callout{min-height:160px}.accordion{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff}.accordion button{width:100%;border:0;background:#fff;text-align:left;padding:16px;font-weight:900;cursor:pointer;display:flex;justify-content:space-between}.accordion .acc-body{display:none;padding:0 16px 16px;color:#334155;line-height:1.65}.accordion.open .acc-body{display:block}.path-builder{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.path-builder button{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;text-align:left;cursor:pointer}.path-builder button:hover{border-color:#bfdbfe;background:#eff6ff}.path-builder strong{display:block;margin-bottom:6px;color:var(--navy)}
    @media(max-width:1180px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.hero-grid,.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}.path-builder{grid-template-columns:repeat(2,minmax(0,1fr))}.filters{display:none}}
    @media(max-width:820px){.app{display:block}.sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-105%);transition:.2s;width:300px}.sidebar.open{transform:translateX(0)}.mobile-overlay{display:block;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:10}.hamb{display:block}.topbar{padding:0 12px}.content{padding:16px}.grid,.grid-2,.hero-grid,.grid-4,.age-note,.path-builder,.resource-grid,.mission-grid,.rubric,.quest-map,.learning-path{grid-template-columns:1fr}.hero h1{font-size:26px}.hero{padding:24px}.section-head{display:block}.modal{border-radius:20px}.modal-close{top:14px;right:14px}}
    @media print{.sidebar,.topbar,.modal-close,.no-print{display:none!important}.app,.main,.content{display:block;height:auto;overflow:visible}.card,.panel,.hero{box-shadow:none;break-inside:avoid}.print-only{display:block}}
  </style>
</head>
<body>
<div class="app">
  <div id="mobileOverlay" class="mobile-overlay hidden" onclick="toggleSidebar()"></div>
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <div class="brand-title">AI Youth Academy</div>
      <div class="brand-sub">A guided AI learning lab for kids, teens, parents, and schools.</div>
    </div>
    <nav id="nav" class="nav"></nav>
    <div class="sidebar-footer">
      <strong>Prototype Build</strong>
      Ages 10–18 | Safe AI use | Study, hobbies, projects, careers
    </div>
  </aside>
  <main class="main">
    <header class="topbar no-print">
      <button class="hamb" onclick="toggleSidebar()">☰</button>
      <div class="search-wrap"><span class="search-icon">⌕</span><input id="searchInput" placeholder="Search trails, prompts, projects, safety lessons, resources..." oninput="render()" /></div>
      <div class="filters">
        <select id="ageFilter" onchange="render()"><option value="all">All ages</option><option>Ages 10–12</option><option>Ages 13–15</option><option>Ages 16–18</option><option>Parents</option></select>
        <select id="topicFilter" onchange="render()"><option value="all">All topics</option><option>Study</option><option>Sports</option><option>Science</option><option>Coding</option><option>Writing</option><option>Art</option><option>Career</option><option>Safety</option><option>AI</option><option>Games</option><option>Hobbies</option><option>Skills</option></select>
      </div>
      <button class="soft-btn" onclick="openPathBuilder()">Build path</button>
      <button class="primary-btn" onclick="downloadPlan()">Download plan</button>
    </header>
    <section id="content" class="content"></section>
  </main>
</div>
<div id="modalOverlay" class="modal-overlay" onclick="overlayClose(event)"><button class="modal-close no-print" onclick="closeModal()">×</button><article id="modal" class="modal"></article></div>
<script>
const navItems=[
  ['start','Start Here','◎'],['trails','Learning Trails','▣'],['promptlab','Prompt Lab','⌘'],['projects','Projects','◈'],['school','Study & School','✎'],['hobbies','Hobbies & Skills','✦'],['externalLearning','External Learning','▶'],['safety','AI Safety','◆'],['resources','Resources','↗']
];
let current='start';
const topics=['Study','Sports','Science','Coding','Writing','Art','Career','Safety','Productivity','Entrepreneurship','Research','Presentation','Media','Nature','Games'];
const ages=['Ages 10–12','Ages 13–15','Ages 16–18'];
const safeReminder='Use AI as a coach, tutor, and project partner. Do not copy final answers, do not paste private information, and check important facts with a trusted source or adult.';

const trails=[
 {id:'trail-10-ai-basics',title:'AI Explorer: From Zero to Smart Questions',age:'Ages 10–12',topic:'Study',level:'Beginner',duration:'2 weeks',objective:'Learn what a chatbot is, what it can and cannot do, and how to ask simple useful questions.',story:'This trail is for a student who has never used AI. The goal is not to become technical. The goal is to learn how to ask clear questions, test answers, and use AI for curiosity without treating it as a magic answer machine.',checkpoints:['Explain what AI is in one sentence.','Ask one clear question with context.','Use a follow-up to improve the answer.','Check one answer with a book, teacher, parent, or trusted site.'],project:'Create a “Curiosity Notebook” with 10 questions about animals, space, geography, or sports and one verified answer for each.',prompt:'Explain photosynthesis to me like I am 11. Use a simple example, then ask me three questions to check if I understood.',follow:'Now explain what I got wrong and give me one small practice question.',warning:'Do not ask AI to do homework for you. Ask it to teach you the idea.'},
 {id:'trail-10-creative',title:'Creative Builder: Stories, Comics, and Ideas',age:'Ages 10–12',topic:'Writing',level:'Beginner',duration:'2 weeks',objective:'Use AI to brainstorm stories, characters, worlds, games, and drawings while keeping the student as the author.',story:'The student learns that AI can generate ideas, but the best work still comes from personal choices. The trail teaches idea selection, revision, and originality.',checkpoints:['Create three story ideas.','Choose one and explain why it is the best.','Ask AI for feedback, not a finished story.','Rewrite the ending in your own words.'],project:'Build a 6-scene comic plan with characters, conflict, setting, and a short moral.',prompt:'Help me brainstorm five story ideas about a kid who discovers a hidden island. Do not write the full story. Give me choices and ask me what style I want.',follow:'Ask me five questions that will help me make this story more original.',warning:'Do not publish AI-generated images or writing as fully yours. Explain what you created and what AI helped with.'},
 {id:'trail-10-hobbies',title:'Hobby Coach: Learn Anything Safely',age:'Ages 10–12',topic:'Sports',level:'Beginner',duration:'3 weeks',objective:'Use AI to learn about hobbies like chess, sailing, animals, basketball, music, or drawing with safe adult guidance.',story:'This trail turns a hobby into a small learning plan. A young athlete or hobbyist can learn vocabulary, conditions, rules, practice ideas, and questions to ask a coach or parent.',checkpoints:['Pick one hobby.','Create a beginner glossary.','Build a weekly practice plan.','Ask an adult to review safety-related parts.'],project:'Create a “My Hobby Field Guide” with vocabulary, safety rules, practice drills, and three role models.',prompt:'I am 12 and I want to improve at [hobby]. Make a beginner learning plan with vocabulary, safe practice ideas, things to observe, and questions to ask my coach or parent.',follow:'Turn this into a 7-day checklist with 20-minute tasks.',warning:'AI cannot judge real-world danger. For weather, water, travel, sports injuries, tools, or outdoor conditions, ask a parent, coach, or teacher.'},
 {id:'trail-13-study',title:'Study Strategist: Learn, Practice, Review',age:'Ages 13–15',topic:'Study',level:'Intermediate',duration:'4 weeks',objective:'Use AI to explain hard concepts, create quizzes, find weak spots, and build study routines without cheating.',story:'This trail teaches a repeatable loop: explain, practice, self-test, review mistakes, and summarize. The student does the thinking; AI supports the process.',checkpoints:['Turn class notes into a study guide.','Generate practice questions.','Explain mistakes.','Create a 14-day exam plan.'],project:'Build a subject dashboard for one class with key terms, weak areas, quizzes, and exam plan.',prompt:'Act as my study coach for [subject]. Use my notes below. Create a study guide, explain the hardest ideas simply, and quiz me one question at a time. Do not give me final answers immediately.',follow:'Based on my wrong answers, create a new practice set focused only on my weak areas.',warning:'Do not paste a test question and ask for the answer. Ask for the concept and practice with similar problems.'},
 {id:'trail-13-research',title:'Research Detective: Find, Verify, Explain',age:'Ages 13–15',topic:'Research',level:'Intermediate',duration:'4 weeks',objective:'Learn how to use AI for research while checking sources and avoiding fake facts.',story:'Students learn that AI can sound confident and still be wrong. This trail teaches source checking, comparison, note taking, and fact vs opinion.',checkpoints:['Create a research question.','Ask AI for search terms and source types.','Compare at least three sources.','Write a short evidence table.'],project:'Research a science, history, or geography question and create a verified one-page brief.',prompt:'Help me research this question: [question]. Give me search terms, what sources to look for, what facts to verify, and a table to compare evidence. Do not invent citations.',follow:'Here are my sources. Help me identify which are more reliable and why.',warning:'Never trust a citation just because AI wrote it. Open the source and check the claim.'},
 {id:'trail-13-coding',title:'First Coding Partner: Games and Websites',age:'Ages 13–15',topic:'Coding',level:'Intermediate',duration:'6 weeks',objective:'Use AI to learn basic coding by building small projects and understanding each line.',story:'The student does not need to be a developer. The goal is to build confidence: ask for simple code, run it, debug errors, and explain what each part does.',checkpoints:['Build a small webpage.','Ask AI to explain the code line by line.','Fix one error message.','Add one feature yourself.'],project:'Create a personal hobby webpage with cards, images, and a small quiz.',prompt:'Teach me how to build a simple HTML page about [topic]. Give me the code, then explain each section like I am 14. After that, give me one small challenge to modify it.',follow:'Here is the error I got: [error]. Explain what it means and how to fix it step by step.',warning:'Do not run code you do not understand, especially code that asks for passwords, tokens, or private files.'},
 {id:'trail-13-present',title:'Presentation Builder: Clear Slides, Better Speaking',age:'Ages 13–15',topic:'Presentation',level:'Intermediate',duration:'3 weeks',objective:'Use AI to structure school presentations, write speaker notes, and practice answers.',story:'The trail teaches the student to start with a thesis, build a clear structure, and rehearse. AI helps with organization and practice, not with replacing the student.',checkpoints:['Create a 5-slide outline.','Write one sentence per slide.','Practice answers to 10 likely questions.','Record and improve one rehearsal.'],project:'Deliver a 3-minute presentation on a topic the student cares about.',prompt:'Help me prepare a 5-slide presentation about [topic]. Give me a clear thesis, slide titles, what to say on each slide, and three questions my teacher may ask.',follow:'Act as my audience. Ask me one question at a time and grade my answer for clarity.',warning:'Do not use AI to create facts or charts without checking the data.'},
 {id:'trail-16-college',title:'College Prep: Essays, Majors, and Learning Plan',age:'Ages 16–18',topic:'Career',level:'Advanced',duration:'6 weeks',objective:'Use AI to explore majors, organize applications, improve essays, and build a realistic college-prep plan.',story:'This trail is for older teens who need structure. AI can help compare majors, plan deadlines, critique essays, and prepare interviews, while the student keeps a real personal voice.',checkpoints:['Compare three majors.','Create an application timeline.','Draft an essay outline from personal experiences.','Get critique without losing voice.'],project:'Build a college decision matrix with major fit, cost, location, selectivity, career paths, and next actions.',prompt:'Act as a college planning coach. Help me compare these majors: [majors]. Ask me questions about my interests, strengths, constraints, and career goals. Then build a decision matrix.',follow:'Review this essay draft for clarity, structure, and authenticity. Do not rewrite it in a generic voice.',warning:'Do not let AI invent personal experiences for essays. Admissions writing must be truthful and personal.'},
 {id:'trail-16-career',title:'Career Discovery: From Interests to Skills',age:'Ages 16–18',topic:'Career',level:'Advanced',duration:'5 weeks',objective:'Use AI to map interests into career paths, required skills, projects, and early portfolio work.',story:'This trail treats career exploration as research. Instead of asking “what job should I do,” the student learns to compare roles, day-to-day tasks, skills, trade-offs, and portfolio projects.',checkpoints:['Map interests to 10 career paths.','Interview AI as a role simulator.','Build a skill gap table.','Create one portfolio project.'],project:'Create a personal career map with three target paths and one 30-day skill project for each.',prompt:'I am 17 and interested in [interests]. Help me explore career paths. For each path, show daily tasks, skills needed, school subjects that matter, beginner projects, and what might be frustrating about the job.',follow:'Create a 30-day project plan that proves I am serious about one of these paths.',warning:'AI career advice is not a final answer. Verify with real people, internships, school counselors, and job descriptions.'},
 {id:'trail-16-productivity',title:'Productivity System: Notes, Tasks, and Focus',age:'Ages 16–18',topic:'Productivity',level:'Advanced',duration:'4 weeks',objective:'Use AI to organize school, clubs, sports, applications, and personal projects into a manageable system.',story:'Older teens often have many moving parts. This trail teaches weekly planning, task breakdown, review, and focus routines without turning AI into a distraction.',checkpoints:['Create a weekly command center.','Break big work into tasks.','Use AI for review and planning.','Track progress honestly.'],project:'Build a weekly student operating system with classes, deadlines, projects, health habits, and review questions.',prompt:'Help me build a weekly student operating system. My responsibilities are: [list]. Create categories, a weekly review, a daily checklist, and a plan for catching up when I fall behind.',follow:'Here is what I did this week. Help me review what worked, what failed, and what I should change next week.',warning:'Do not spend more time designing the system than doing the work.'},
 {id:'trail-sports',title:'Athlete Intelligence: Strategy, Training, Conditions',age:'Ages 10–18',topic:'Sports',level:'Mixed',duration:'4 weeks',objective:'Use AI to prepare smarter for sports and competitions by learning rules, strategy, conditions, and reflection.',story:'This is the broad sports example. A sailor, tennis player, runner, football player, swimmer, or chess competitor can use AI to study the environment, rules, opponents, equipment, and practice habits. For safety or medical issues, adult and coach review is mandatory.',checkpoints:['Build a sport glossary.','Create a competition checklist.','Study conditions and strategy factors.','Write a post-practice reflection.'],project:'Create a competition preparation notebook: rules, conditions, strategy choices, equipment checklist, and reflection template.',prompt:'I practice [sport] and I am [age]. Help me prepare for a competition. Create a safe checklist for conditions, rules, equipment, warm-up questions, strategy factors, and what to discuss with my coach.',follow:'After practice, ask me 10 reflection questions and help me identify one improvement for next time.',warning:'AI cannot replace a coach, doctor, parent, official weather forecast, or safety authority.'},
 {id:'trail-science',title:'Science & Nature Investigator',age:'Ages 10–18',topic:'Science',level:'Mixed',duration:'5 weeks',objective:'Use AI to explore animals, oceans, weather, space, chemistry, physics, and nature with experiments and fact checks.',story:'This trail is designed for curiosity. It teaches students to ask why, build simple models, compare explanations, and separate observation from interpretation.',checkpoints:['Ask a scientific question.','Create a safe observation plan.','Build a mini glossary.','Verify one answer with a trusted source.'],project:'Create a field guide for one ecosystem, planet, animal, or natural process.',prompt:'Help me investigate [science topic]. Explain the key ideas, give me safe observations I can make, create a glossary, and suggest reliable sources to verify the answer.',follow:'Quiz me with five questions, then explain my mistakes.',warning:'Do not run experiments involving heat, chemicals, electricity, wildlife handling, or outdoor risks without adult supervision.'},
 {id:'trail-media',title:'Design & Media Lab',age:'Ages 13–18',topic:'Art',level:'Intermediate',duration:'4 weeks',objective:'Use AI for design briefs, video ideas, editing plans, visual style boards, and ethical media creation.',story:'Students learn that creative tools can help with brainstorming and production, but they need originality, consent, and credit. This is useful for school projects, clubs, channels, and portfolios.',checkpoints:['Create a creative brief.','Define target audience.','Generate three style directions.','Build a production checklist.'],project:'Design a campaign for a school club, hobby, or event with poster text, visual direction, and social post plan.',prompt:'Act as a creative director for a student project. Help me design a campaign about [topic]. Give me audience, message, visual style, poster copy, and a production checklist.',follow:'Review my draft and tell me what is confusing, boring, or too generic.',warning:'Do not use someone’s face, voice, art, or personal story without permission.'},
 {id:'trail-entrepreneur',title:'Young Builder: Business Ideas and Small Projects',age:'Ages 13–18',topic:'Entrepreneurship',level:'Intermediate',duration:'6 weeks',objective:'Use AI to turn interests into small safe projects, simple business ideas, research plans, and prototypes.',story:'This trail is not about raising money. It is about learning how to define a problem, understand users, build a prototype, and communicate value.',checkpoints:['Define a problem.','Interview potential users safely.','Sketch a simple solution.','Create a one-page pitch.'],project:'Build a small project pitch: problem, audience, solution, prototype, risks, and next step.',prompt:'I am a student interested in building a small project around [interest]. Help me define a real problem, who has it, what I could build safely, and how to test the idea without spending much money.',follow:'Turn this into a one-page pitch with problem, solution, users, next steps, and risks.',warning:'Do not contact strangers, collect personal data, or sell anything without parent/guardian approval.'},
 {id:'trail-public-speaking',title:'Public Speaking Coach',age:'Ages 10–18',topic:'Presentation',level:'Mixed',duration:'3 weeks',objective:'Use AI to practice speeches, debate, interviews, class participation, and concise answers.',story:'The student learns to structure answers, reduce filler, and handle questions. AI becomes a practice audience.',checkpoints:['Write a 60-second answer.','Practice likely questions.','Improve one weak answer.','Create a rehearsal checklist.'],project:'Prepare and rehearse a 2-minute speech about a favorite topic.',prompt:'Act as my public speaking coach. I need to speak about [topic] for [time]. Help me create a simple structure, practice questions, and feedback criteria.',follow:'Ask me one question at a time and score my answer for clarity, confidence, and evidence.',warning:'Do not memorize AI text word for word. Use your own voice.'}
];

function titleCase(s){return s.replace(/\b\w/g,m=>m.toUpperCase())}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mobileOverlay').classList.toggle('hidden')}
function setView(v){current=v;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));if(innerWidth<820){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.add('hidden')}render()}
function initNav(){document.getElementById('nav').innerHTML=navItems.map(n=>`<button data-view="${n[0]}" onclick="setView('${n[0]}')"><span>${n[2]}</span>${n[1]}</button>`).join('');document.querySelector('[data-view="start"]').classList.add('active')}
function allItems(){return [...trails,...workflows,...prompts,...projectIdeas,...studyGuides,...careerModules,...safetyLessons,...allResources,...externalLearning]}
function progress(){const done=JSON.parse(localStorage.getItem('aiYouthDone')||'[]');return new Set(done)}
function saveProgress(set){localStorage.setItem('aiYouthDone',JSON.stringify([...set]));updateProgressUI()}
function xpFor(item){if(!item)return 10;let base=item.type==='Project'?90:item.type==='Career Module'?70:item.type==='Safety Lesson'?45:item.type==='Study Guide'?55:item.type==='Workflow'?50:item.type==='Prompt'?20:item.type==='Resource'?10:75;if(item.level==='Advanced')base+=25;if(item.level==='Intermediate')base+=10;return base}
function totalXP(){const p=progress();return allItems().filter(x=>p.has(x.id)).reduce((sum,x)=>sum+xpFor(x),0)}
function learnerLevel(){const xp=totalXP();if(xp>=2500)return {name:'Level 7 · AI Builder',next:3200};if(xp>=1800)return {name:'Level 6 · Project Lead',next:2500};if(xp>=1200)return {name:'Level 5 · Research Pilot',next:1800};if(xp>=750)return {name:'Level 4 · Prompt Ranger',next:1200};if(xp>=400)return {name:'Level 3 · Study Hacker',next:750};if(xp>=150)return {name:'Level 2 · Smart Explorer',next:400};return {name:'Level 1 · AI Rookie',next:150}}
function topicCompletions(topic){const p=progress();return allItems().filter(x=>p.has(x.id)&&topicFor(x)===topic).length}
function earnedBadges(){return [{name:'Safe Starter',ok:topicCompletions('Safety')>=2},{name:'Study Pilot',ok:topicCompletions('Study')>=3},{name:'Prompt Ranger',ok:progress().size>=8},{name:'Project Builder',ok:[...progress()].some(id=>(findItem(id)||{}).type==='Project')},{name:'Research Scout',ok:topicCompletions('Research')>=1||topicCompletions('Science')>=2},{name:'Career Mapper',ok:topicCompletions('Career')>=2}]}
function toggleComplete(id){const p=progress();const wasDone=p.has(id);wasDone?p.delete(id):p.add(id);saveProgress(p);render();if(!wasDone){setTimeout(()=>{const el=document.querySelector('[data-game-panel]');if(el){el.classList.add('celebrate');setTimeout(()=>el.classList.remove('celebrate'),750)}},50)}}
function updateProgressUI(){document.querySelectorAll('[data-progress-bar]').forEach(el=>{const p=progress().size,total=trails.length+workflows.length+projectIdeas.length+studyGuides.length+careerModules.length+safetyLessons.length;const pct=Math.min(100,Math.round((p/total)*100));el.style.width=pct+'%'});document.querySelectorAll('[data-progress-count]').forEach(el=>el.textContent=progress().size)}
function resetProgress(){if(confirm('Reset all completed modules?')){localStorage.removeItem('aiYouthDone');render()}}
function matches(item){const q=document.getElementById('searchInput').value.trim().toLowerCase();const af=document.getElementById('ageFilter').value;const tf=document.getElementById('topicFilter').value;const blob=JSON.stringify(item).toLowerCase();const ageOk=af==='all'||(item.age||'').includes(af)||af==='Parents'&&item.age==='Parents'||(item.age||'').includes('10–18');const topicOk=tf==='all'||(item.topic||'').toLowerCase().includes(tf.toLowerCase())||blob.includes(tf.toLowerCase());const qOk=!q||blob.includes(q);return ageOk&&topicOk&&qOk}
function tag(t,cls=''){return `<span class="tag ${cls}">${t}</span>`}
function card(item){const done=progress().has(item.id);return `<article class="card" data-card="${item.id}">
  <div class="tag-row">${tag(item.age||'All ages','age')}${tag(item.topic||item.kind||item.type,'topic')}${tag(item.level||item.kind||'Module','level')}${tag('+'+xpFor(item)+' XP','level')}${done?tag('Completed','done'):''}</div>
  <h3>${item.title}</h3><p>${item.objective||item.story||item.when||''}</p>
  <div class="reward-strip"><span class="reward">Mission</span><span class="reward">Badge progress</span><span class="reward">Portfolio artifact</span></div>
  <div class="card-footer"><span>${item.type||item.kind||'Module'}</span><span><button class="open-btn" onclick="openItem('${item.id}')">Open lab</button></span></div>
</article>`}
function grid(items){const filtered=items.filter(matches);return filtered.length?`<div class="grid">${filtered.map(card).join('')}</div>`:`<div class="empty">No modules match the current search and filters.</div>`}
function section(title,subtitle,items){return `<div class="section-head"><div><h2>${title}</h2><p>${subtitle}</p></div></div>${grid(items)}`}
function renderGamePanel(){const xp=totalXP();const lvl=learnerLevel();const pct=Math.min(100,Math.round((xp/lvl.next)*100));const badges=earnedBadges();return `<div class="game-panel" data-game-panel><span class="level-badge">${lvl.name}</span><h3>Mission Control</h3><p>Complete labs to earn XP, unlock badges, and build a student portfolio. Rewards are tied to real learning outputs, not random points.</p><div class="xp-row"><div><div class="bar"><div style="width:${pct}%"></div></div><p class="small" style="color:#cfe7ff;margin-top:8px">${xp} XP earned · next level at ${lvl.next} XP</p></div><div class="xp-number">${xp}</div></div><div class="badge-shelf">${badges.map(b=>`<span class="badge ${b.ok?'':'locked'}">${b.ok?'Unlocked':'Locked'} · ${b.name}</span>`).join('')}</div></div>`}
function renderQuestMap(){const p=progress();const quests=[['Start AI Basics','trail-10-ai-basics','Learn the core AI rules.'],['Complete 2 Safety Lessons','safety-1','Protect privacy and verify facts.'],['Run 3 Prompt Stacks','prompt-0','Practice structured prompting.'],['Finish 1 Project','project-0','Create a real artifact.'],['Build Career Map','trail-16-career','Connect interests to skills.']];return `<div class="section-head"><div><h2>Quest Map</h2><p>A light game layer that gives the student a clear sequence without turning the academy into a toy. Each quest ends in a real output.</p></div></div><div class="quest-map">${quests.map((q,i)=>{const complete=i===1?topicCompletions('Safety')>=2:i===2?progress().size>=6:i===3?[...p].some(id=>(findItem(id)||{}).type==='Project'):p.has(q[1]);return `<div class="quest ${complete?'done':''}"><strong>${complete?'Completed':'Quest'} ${i+1}: ${q[0]}</strong><span>${q[2]}</span><div class="quest-xp">${complete?'Reward collected':'Reward: +100 XP path credit'}</div></div>`}).join('')}</div>`}
function hero(){const done=progress().size;const total=trails.length+workflows.length+projectIdeas.length+studyGuides.length+careerModules.length+safetyLessons.length;const pct=Math.min(100,Math.round(done/total*100));return `<div class="hero"><h1>From AI beginner to thoughtful student builder.</h1><p>This platform teaches kids and teens how to use AI for school, hobbies, projects, sports, creativity, research, and career discovery. The model is simple: ask better questions, learn actively, verify facts, protect privacy, and use AI as a coach rather than a shortcut.</p><div class="hero-grid"><div class="hero-stat"><strong>${trails.length}</strong><span>guided learning trails</span></div><div class="hero-stat"><strong>${prompts.length}</strong><span>copyable prompts</span></div><div class="hero-stat"><strong>${workflows.length}</strong><span>step-by-step workflows</span></div><div class="hero-stat"><strong>${allResources.length+externalLearning.length}</strong><span>external resources</span></div></div></div>
<div class="grid-2" style="margin-top:18px">${renderGamePanel()}<div class="panel progress-card"><div><h3>Your academy progress</h3><p class="small">Completed modules are stored locally in this browser. This makes the prototype useful for demos and family pilots without a backend.</p><div class="bar"><div data-progress-bar style="width:${pct}%"></div></div></div><div class="kpi"><span data-progress-count>${done}</span>/<span>${total}</span></div></div></div><div class="grid-2" style="margin-top:18px"><div class="panel"><h3>Core rule</h3><p class="rich-text"><strong>AI should raise the quality of thinking, not replace thinking.</strong> The safest student workflow is: ask → try → check → revise → explain in your own words.</p><div class="modal-actions"><button class="primary-btn" onclick="openPathBuilder()">Build a path</button><button class="soft-btn" onclick="downloadChecklist()">Download safety checklist</button><button class="danger-btn" onclick="resetProgress()">Reset progress</button></div></div><div class="panel"><h3>Reward logic</h3><p class="rich-text">XP is earned only when a lab creates a useful output: a study guide, source table, project plan, presentation, safety review, field guide, or career map. The game mechanics are designed to reward disciplined learning, not screen time.</p></div></div>`}
function renderStart(){return `${hero()}${renderQuestMap()}<div class="section-head"><div><h2>How the academy works</h2><p>Start with an age track, complete quests, run prompt stacks, and build one real artifact. Parents and teachers can use the safety tab as the operating policy.</p></div></div><div class="age-note"><div class="callout blue"><h3>Ages 10–12</h3><p>Focus on curiosity, basic explanations, safe questions, hobbies, creativity, and simple school support. The key habit is asking AI to teach, not answer.</p></div><div class="callout green"><h3>Ages 13–15</h3><p>Focus on study systems, research, presentations, source checks, coding basics, projects, and better revision loops. The student starts moving from prompts to workflows.</p></div><div class="callout amber"><h3>Ages 16–18</h3><p>Focus on college prep, career exploration, productivity, technical skills, writing quality, portfolio projects, entrepreneurship, and responsible independence.</p></div></div>${section('Recommended first trails','These modules move a beginner from simple AI use to safe and useful student workflows.',trails.slice(0,6))}`}
function renderTrails(){return `${section('Learning Trails','Age-aware and interest-based tracks with objectives, checkpoints, projects, prompts, follow-ups, and warnings.',trails)}<div class="divider"></div>${section('Career Exploration Modules','Older students can use these to map interests into skills, projects, and real-world paths.',careerModules)}`}
function renderPromptLab(){return `${section('Prompt Lab','Prompts are embedded in workflows. Each includes purpose, beginner version, stronger version, follow-up, and what not to do.',prompts)}<div class="divider"></div>${section('Guided Workflows','These are operating routines, not one-off prompts. They teach the student how to use AI step by step.',workflows)}`}
function renderProjects(){return `${section('Project Studio','Project ideas that turn AI use into a real output: guide, webpage, presentation, field notebook, portfolio, pitch, or research brief.',projectIdeas)}`}
function renderSchool(){return `${section('Study & School','Study guides focused on learning, practice, revision, and verification without replacing the student’s own work.',studyGuides)}<div class="divider"></div>${section('School Workflows','Use these for notes, quizzes, exam plans, essays, presentations, and source checking.',workflows.filter(w=>['Study','Research','Presentation','Writing','Safety'].includes(w.topic)))}`}
function renderHobbies(){return `${section('Hobbies & Skills','Interest-based modules for sports, nature, coding, writing, media, art, games, productivity, and entrepreneurship.',[...trails.filter(t=>!['Study','Safety','Career'].includes(t.topic)),...projectIdeas.filter(p=>!['Study','Safety','Career'].includes(p.topic))])}`} 
function renderExternalLearning(){const ai=externalLearning.filter(x=>x.topic==='AI');const games=externalLearning.filter(x=>x.topic==='Games'||x.topic==='Coding');const hobbies=externalLearning.filter(x=>['Hobbies','Skills','Art','Media'].includes(x.topic));return `<div class="section-head"><div><h2>External Learning Hub</h2><p>A YouTube-heavy learning hub for AI chatbots, creative tools, coding, hobbies, skills, and game design. Each item is a watch mission with a concrete output, not passive screen time.</p></div></div><div class="learning-path"><div class="mini-card"><strong>1. Watch</strong><span>Open one video/channel/search result and take five notes.</span></div><div class="mini-card"><strong>2. Ask AI</strong><span>Use the lab prompt to turn notes into a checklist, plan, or mini-project.</span></div><div class="mini-card"><strong>3. Build</strong><span>Create one artifact: prompt library, game design doc, field guide, poster, webpage, or practice plan.</span></div><div class="mini-card"><strong>4. Verify</strong><span>Check facts, credit sources, and ask a parent/teacher when needed.</span></div></div>${section('AI Chatbots and AI Tools','YouTube resources for ChatGPT, Claude, Gemini, NotebookLM, Perplexity, AI tool workflows, and AI literacy.',ai)}<div class="divider"></div>${section('Games, Coding, and Game Design','Resources for Scratch, coding, game engines, game design, prototypes, and creative coding.',games)}<div class="divider"></div>${section('Hobbies, Skills, Creativity, and Science','Resources for productivity, science, art, music, chess, engineering, nature, 3D design, and creative media.',hobbies)}`}
function renderSafety(){return `<div class="section-head"><div><h2>AI Safety and Responsible Use</h2><p>This section is the operating policy for families and schools. It teaches privacy, truth checking, school integrity, consent, bias awareness, and when to ask an adult.</p></div><div><button class="primary-btn" onclick="downloadChecklist()">Download checklist</button></div></div><div class="grid-2"><div class="callout rose"><h3>Never paste</h3><ul class="list"><li>Full name plus address, school, phone, or location.</li><li>Passwords, account codes, private documents, private photos, or medical details.</li><li>Information about another person without permission.</li></ul></div><div class="callout amber"><h3>Always check</h3><ul class="list"><li>Facts, statistics, quotes, citations, dates, and legal/medical/safety claims.</li><li>School rules for AI use before assignments.</li><li>Adult review for sensitive, outdoor, health, travel, or high-stakes decisions.</li></ul></div></div>${section('Responsible-Use Lessons','Each lesson can be opened, discussed, marked complete, and used in a family AI agreement.',safetyLessons)}`}
function renderResources(){return `${section('External Learning Resources','Curated resources across websites, AI tools, YouTube, X profiles, Substack/newsletters, Instagram, coding, science, study, safety, career exploration, and creative production.',allResources)}`}
function render(){const viewMap={start:renderStart,trails:renderTrails,promptlab:renderPromptLab,projects:renderProjects,school:renderSchool,hobbies:renderHobbies,externalLearning:renderExternalLearning,safety:renderSafety,resources:renderResources};document.getElementById('content').innerHTML=viewMap[current]();updateProgressUI()}
function findItem(id){return allItems().find(x=>x.id===id)}
function topicFor(it){return it.topic||it.kind||it.type||'Study'}
function studentProfile(it){const age=it.age||'Ages 10–18';const topic=topicFor(it);const map={Study:'Sofia, 13, has a science test in 10 days and wants to study without copying answers.',Science:'Leo, 12, is building a field notebook about oceans, weather, animals, and ecosystems.',Sports:'Mateo, 14, is preparing for a weekend competition and needs a safe strategy checklist reviewed by a coach.',Coding:'Nina, 15, is building her first personal webpage and wants to understand every line of code.',Writing:'Emma, 12, is writing a short story and wants feedback without losing her own voice.',Art:'Ava, 15, is designing a poster for a school club and needs a clear creative brief.',Career:'Lucas, 17, is comparing three career paths and wants a realistic skill-building plan.',Safety:'A parent and student are creating a clear family rulebook for safe AI use.',Productivity:'Mia, 16, is managing classes, sports, applications, and a personal project.',Research:'Noah, 14, is researching a school topic and needs to separate verified facts from weak claims.',Presentation:'Olivia, 13, is preparing a 3-minute class presentation and wants to rehearse questions.',Entrepreneurship:'Daniel, 16, is testing a small student-safe project idea without collecting private data.',Games:'Rafa, 14, is designing a game and needs rules, balance, characters, and test questions.',Nature:'Clara, 12, is preparing a local nature guide with adult-supervised observations.'};return map[topic]||`A student in ${age} is completing the module “${it.title}” with parent or teacher review.`}
function fixedTheme(it){const topic=topicFor(it);const title=(it.title||'AI learning lab').toLowerCase();if(title.includes('sailing'))return 'sailing conditions, wind, tide, route notes, safety review, and coach questions';if(title.includes('college'))return 'college-major comparison, application timeline, essay feedback, and decision matrix';if(title.includes('career'))return 'career map, role interviews, skill gaps, and 30-day portfolio project';if(title.includes('coding')||topic==='Coding')return 'HTML personal webpage, debugging journal, code explanation, and feature checklist';if(title.includes('science')||topic==='Science')return 'marine ecosystem field guide, verified facts, observation plan, and source table';if(topic==='Sports')return 'competition prep notebook with rules, conditions, equipment, strategy factors, and post-practice review';if(topic==='Writing')return 'original story plan, feedback cycle, revision checklist, and authorship note';if(topic==='Art')return 'school-club campaign with poster copy, visual direction, and production checklist';if(topic==='Presentation')return 'five-slide presentation, speaker notes, audience questions, and rehearsal rubric';if(topic==='Safety')return 'family AI agreement, privacy checklist, fact-check routine, and school-use rule';if(topic==='Productivity')return 'weekly student operating system with tasks, deadlines, review, and recovery plan';if(topic==='Entrepreneurship')return 'student-safe project pitch with problem, audience, prototype, test, and risks';if(topic==='Research')return 'verified research brief with claim table, source quality, and open questions';return `${it.title} with a fixed output, clear checklist, and adult review where needed`}
function deliverables(it){const theme=fixedTheme(it);return [`One-page mission brief for ${theme}.`,`Three-part learning plan: understand, practice, produce.`,`Prompt stack with tutor, coach, critic, fact-checker, and parent/teacher review prompts.`,`External resource pack linked to the node topic.`,`Final artifact that the student can explain without reading AI text.`]}
function labPlan(it){const theme=fixedTheme(it);return [`Read the mission scenario and define the final output: ${theme}.`,`Open two external resources from the node pack and take five notes before prompting AI.`,`Run the Tutor Prompt and answer the model’s questions before asking for an improved version.`,`Run the Project Builder Prompt and create the first draft of the artifact.`,`Run the Critic Prompt to find gaps, weak logic, missing evidence, and unclear wording.`,`Run the Source Check Prompt and verify facts, dates, rules, weather, safety, or statistics outside the chatbot.`,`Rewrite the final work in the student’s own words and complete the parent/teacher review prompt.`]}
function promptStack(it){const theme=fixedTheme(it);const profile=studentProfile(it);const age=it.age||'Ages 10–18';const topic=topicFor(it);return [
 {name:'1. Mission Brief Prompt',text:`Act as a patient AI learning coach for a student in ${age}. The fixed mission is: ${theme}. The student profile is: ${profile}

Build a complete mission brief with: goal, why it matters, exact final output, vocabulary list, required materials, safe boundaries, and a 7-step work plan. Do not ask the student to choose a topic. Use the mission above as the topic.`},
 {name:'2. Tutor Prompt',text:`Teach the core ideas needed for this mission: ${theme}. Explain them in simple language, give two concrete examples, then ask five short questions to test understanding. Do not give a final school answer. Wait for the student response after the questions.`},
 {name:'3. Practice Prompt',text:`Create a practice exercise for this mission: ${theme}. Include a warm-up task, one medium task, one challenge task, and an answer-review guide. The student must try first before seeing the model answer.`},
 {name:'4. Project Builder Prompt',text:`Help build the final artifact for: ${theme}. Create a structured template with headings, example starter text, evidence needed, visual ideas, and a completion checklist. Keep the student as the author. Do not invent personal experiences, facts, citations, measurements, or results.`},
 {name:'5. Critic Prompt',text:`Review the student's draft for the mission: ${theme}. Grade it on clarity, originality, evidence, structure, safety, and age-appropriate depth. Identify the three weakest parts, explain why they are weak, and give exact revision instructions.`},
 {name:'6. Source Check Prompt',text:`Act as a fact-checking coach. For the mission ${theme}, list every claim that must be verified outside the chatbot. Separate facts, opinions, estimates, safety claims, and personal choices. Recommend trusted source types and explain how the student should record the source.`},
 {name:'7. Parent or Teacher Review Prompt',text:`Create a short review note for a parent, teacher, or coach about this completed AI-supported mission: ${theme}. Include what the student created, what AI helped with, what the student verified, what still needs adult review, and whether the work follows safe and honest AI use.`}
 ]}
function resourceMatches(names){return names.map(name=>allResources.find(r=>r.title===name)).filter(Boolean)}
function nodeResources(it){const topic=topicFor(it);let keys=resourcePacks[topic]||resourcePacks.Study;if(it.title&&it.title.toLowerCase().includes('sailing'))keys=['NOAA Education','Ocean Today','National Weather Service Education','National Geographic Kids','Google Fact Check Explorer'];if(it.type==='Resource')return [];return resourceMatches(keys).slice(0,8)}
function renderResourceLinks(it){const rs=nodeResources(it);if(!rs.length)return '';
 return `<div class="lab-block"><h3>External resources for this node</h3><p class="rich-text">Use these before or after prompting. The student should read or watch at least two resources and write five notes before finalizing the work.</p><div class="resource-grid">${rs.map(r=>`<a class="resource-link" href="${r.url}" target="_blank" rel="noopener"><strong>${r.title}</strong><span>${r.kind} · ${r.objective}</span></a>`).join('')}</div></div>`}
function renderPromptStack(it){const stack=promptStack(it);return `<div class="lab-block"><h3>Copy-ready prompt stack</h3><p class="rich-text">Run these in order. They are fixed to this node and do not require open-ended topic selection.</p><div class="prompt-stack">${stack.map((p,i)=>`<div class="prompt-unit"><h4>${p.name}</h4><div class="prompt-box" id="pb-${i}">${escapeHtml(p.text)}</div><p><button class="copy-btn" onclick="copyPrompt('pb-${i}',this)">Copy prompt</button></p></div>`).join('')}</div></div>`}
function renderLabDetails(it){const theme=fixedTheme(it);return `<div class="lab-block"><h3>Fixed lab scenario</h3><div class="fixed-example">${studentProfile(it)} The assigned output is ${theme}. The student is not asked to select a new topic; the lab already defines the mission.</div><div class="reward-strip"><span class="reward">Reward: +${xpFor(it)} XP</span><span class="reward">Unlocks badge progress</span><span class="reward">Adds portfolio artifact</span></div></div><div class="grid-2"><div class="panel"><h3>Final deliverables</h3><ul class="list">${deliverables(it).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="panel"><h3>Completion standard</h3><ul class="list"><li>The student can explain the final answer without reading AI text.</li><li>At least three claims are verified outside the chatbot.</li><li>The final output includes what AI helped with.</li><li>Safety-sensitive claims receive adult review.</li></ul></div></div><div class="lab-block"><h3>7-step guided path</h3><ol class="step-list">${labPlan(it).map(x=>`<li>${x}</li>`).join('')}</ol></div><div class="lab-block"><h3>Rubric</h3><div class="rubric"><div><strong>Clarity</strong><br>The student explains the idea in simple words.</div><div><strong>Evidence</strong><br>Facts are checked with external sources.</div><div><strong>Originality</strong><br>The student makes real choices and revisions.</div><div><strong>Safety</strong><br>No private data, no cheating, adult review when needed.</div></div></div>`}
function openItem(id){const it=findItem(id);if(!it)return;const done=progress().has(id);let body='';
 if(it.type==='Resource'||it.type==='External Learning'){const isVideo=it.type==='External Learning';body=`<div class="grid-2"><div class="panel"><h3>${isVideo?'Watch mission':'Resource use case'}</h3><p class="rich-text">${it.objective}</p><p class="source">Type: ${it.kind}</p><p><a class="primary-btn" href="${it.url}" target="_blank" rel="noopener">${isVideo?'Open YouTube resource':'Open resource'}</a></p></div><div class="panel"><h3>How to use safely</h3><ul class="list"><li>Use the resource for learning, not passive scrolling.</li><li>Take five notes before asking AI to summarize or plan.</li><li>Parents should review YouTube channels and comments for younger students.</li><li>Do not message strangers, click suspicious links, or share private information.</li></ul></div></div>${isVideo?`<div class="lab-block"><h3>After watching: copy-ready AI prompt</h3><div class="prompt-box" id="pb-video">I watched a learning resource titled: ${escapeHtml(it.title)}. The topic is ${escapeHtml(it.topic)}. Help me turn my notes into a useful student output.

My five notes are:
1. 
2. 
3. 
4. 
5. 

Create: (1) a simple explanation, (2) a checklist, (3) a 7-day practice plan, (4) one small project idea, and (5) three questions I should ask a parent, teacher, coach, or mentor. Do not invent facts from the video. Work only from my notes.</div><p><button class="copy-btn" onclick="copyPrompt('pb-video',this)">Copy post-watch prompt</button></p></div><div class="lab-block"><h3>Final output</h3><ul class="list"><li>One-page video learning note.</li><li>Seven-day practice checklist.</li><li>One mini-project based on the video.</li><li>One safety or source-check note.</li></ul></div>`:''}`}
 else {body=`${renderLabDetails(it)}${renderPromptStack(it)}${renderResourceLinks(it)}<div class="lab-block"><h3>Node-specific warning</h3><p class="rich-text">${it.warning||safeReminder}</p></div>`}
 document.getElementById('modal').innerHTML=`<div class="modal-head"><div class="tag-row">${tag(it.age||'All ages','age')}${tag(it.topic||it.kind||it.type,'topic')}${tag(it.level||it.kind||'Module','level')}</div><h1>${it.title}</h1><p>${it.type||it.kind||'Module'} · deeper lab view · +${xpFor(it)} XP reward</p></div><div class="modal-body">${body}<div class="modal-actions no-print"><button class="${done?'danger-btn':'primary-btn'}" onclick="toggleComplete('${it.id}');openItem('${it.id}')">${done?'Mark incomplete':'Collect XP / Mark complete'}</button><button class="soft-btn" onclick="window.print()">Print / Save PDF</button><button class="soft-btn" onclick="closeModal()">Close</button></div></div>`;document.getElementById('modalOverlay').style.display='flex'}
function closeModal(){document.getElementById('modalOverlay').style.display='none'}
function overlayClose(e){if(e.target.id==='modalOverlay')closeModal()}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function copyPrompt(id,btn){const txt=document.getElementById(id).innerText;navigator.clipboard?.writeText(txt).then(()=>{const old=btn.innerText;btn.innerText='Copied';setTimeout(()=>btn.innerText=old,1100)}).catch(()=>{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();btn.innerText='Copied'})}
function openPathBuilder(){const options=[['Ages 10–12 Starter','trail-10-ai-basics','Start with AI basics, then complete Curiosity Notebook and Private Information Rule.'],['Ages 13–15 Study','trail-13-study','Start with Study Strategist, then complete Study Guide, Quiz, and Mistake Journal workflows.'],['Ages 16–18 College','trail-16-college','Start with College Prep, then complete Career Discovery and College Decision Matrix.'],['Sports & Hobbies','trail-sports','Start with Athlete Intelligence, then complete competition checklist and post-practice review.'],['Coding Starter','trail-13-coding','Start with First Coding Partner, then complete Simple Webpage and Debug Diary.'],['Science & Nature','trail-science','Start with Science & Nature Investigator, then build a field guide with NOAA/NASA resources.'],['Creative Media','trail-media','Start with Design & Media Lab, then build a club campaign and revision checklist.'],['Career Discovery','trail-16-career','Start with Career Discovery, then complete a 30-day portfolio project.']];document.getElementById('modal').innerHTML=`<div class="modal-head"><h1>Build a learning path</h1><p>Each path already has a fixed first module, fixed deliverables, and a review sequence. No open-ended selection is required.</p></div><div class="modal-body"><div class="path-builder">${options.map(o=>`<button onclick="openItem('${o[1]}')"><strong>${o[0]}</strong><span class="small">${o[2]}</span></button>`).join('')}</div><div class="divider"></div><div class="callout blue"><strong>Required sequence:</strong> first trail → two workflows → three prompt-stack runs → one project → one safety lesson → parent/teacher review.</div></div>`;document.getElementById('modalOverlay').style.display='flex'}
function downloadBlob(filename,text){const blob=new Blob([text],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function downloadPlan(){const txt=`AI Youth Academy - 30 Day Learning Plan

Game layer
- Target: reach Level 3 by the end of 30 days.
- Earn XP by completing labs that produce real work.
- Unlock at least three badges: Safe Starter, Study Pilot, and Project Builder.
- Final boss: present one finished artifact to a parent, teacher, coach, or mentor.

Week 1 - AI Basics
1. Complete one age-based trail.
2. Learn the rule: ask, try, check, revise.
3. Complete two safety lessons: Private Information Rule and Hallucination Rule.
4. Reward: unlock Safe Starter.

Week 2 - Study Workflow
1. Complete the Study Strategist trail.
2. Run three prompt stacks: tutor, practice, critic.
3. Keep a mistake journal.
4. Reward: unlock Study Pilot.

Week 3 - Interest Project
1. Complete one project lab.
2. Use two external resources before finalizing.
3. Verify at least three claims.
4. Reward: unlock Project Builder.

Week 4 - Final Output
1. Create one final artifact: presentation, webpage, field guide, essay outline, portfolio, or project pitch.
2. Ask AI for critique.
3. Revise in your own voice.
4. Present to a parent, teacher, coach, or mentor.
5. Reward: final boss completed.

Core rules
- Do not paste private information.
- Do not copy final answers.
- Check important facts.
- Ask adults for sensitive or safety-related topics.
- Use AI to improve thinking, not replace thinking.
`;downloadBlob('ai-youth-academy-30-day-plan.txt',txt)}
function downloadChecklist(){const txt=`AI Youth Academy - Family Safety Checklist\n\nBefore using AI\n[ ] I know what I am trying to learn or build.\n[ ] I checked whether my school allows AI for this task.\n[ ] I removed private information.\n[ ] I will not ask AI to do final homework for me.\n\nWhile using AI\n[ ] I ask AI to explain, quiz, critique, or guide me.\n[ ] I ask follow-up questions.\n[ ] I keep track of what AI helped with.\n[ ] I do not share passwords, addresses, school logins, photos, or private details.\n\nAfter using AI\n[ ] I check important facts with trusted sources.\n[ ] I rewrite final work in my own words.\n[ ] I ask an adult for sensitive, medical, legal, outdoor, travel, weather, or safety-related topics.\n[ ] I can explain what I learned without reading the AI answer.\n`;downloadBlob('ai-youth-academy-safety-checklist.txt',txt)}
