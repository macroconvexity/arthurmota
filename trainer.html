function makeTopic(name, idx){return {id:'topic-'+idx,title:name,type:'Topic Trail',objective:`Turn ${name.toLowerCase()} into a repeatable workflow with defined inputs, review steps, and output standards.`,tools:['Claude','ChatGPT','NotebookLM','Perplexity'][idx%4],difficulty:idx<15?'Beginner':idx<35?'Intermediate':'Advanced',workflow:['Define the business question and the audience.','Collect source material and remove restricted data.','Generate structured first pass with assumptions labeled.','Run critique prompt for gaps and weak evidence.','Finalize with source verification and human review.'],prompt:`Help with ${name}. Produce a practical output for investment professionals with objective, required inputs, analysis, risks, open questions, and next steps. Do not invent information.`,advanced:`Stress-test this ${name} output for weak logic, unsupported statements, missing context, and compliance risk.`,qc:['Check audience fit.','Verify factual claims.','Remove generic AI language.','Label limitations clearly.'],mistakes:['Accepting generic summaries.','Skipping critique.','Not specifying format.','Letting AI invent evidence.']};}
function makePrompt(category, idx){return {id:'prompt-'+idx,title:`${category}: Workflow Prompt ${idx+1}`,type:'Prompt',category,tools:['Claude','ChatGPT','Perplexity','NotebookLM','Gemini'][idx%5],difficulty:idx<30?'Beginner':idx<75?'Intermediate':'Advanced',objective:`Create a high-quality ${category.toLowerCase()} output from raw inputs with clear assumptions and review points.`,workflow:['Paste anonymized inputs.','Run primary prompt.','Run red-team review.','Edit for house style.','Verify numbers and sources.'],prompt:`Act as a senior ${category} specialist. I will provide raw inputs. Produce a professional output with executive takeaway, evidence, risks, follow-up questions, and final draft language. Do not invent data.`,advanced:`Red-team the output for unsupported claims, weak assumptions, missing sensitivities, compliance risk, and language that is too strong for client-facing use.`,qc:['Source-check claims.','Review tone.','Confirm no client data is exposed.','Validate calculations outside the model.'],mistakes:['No input structure.','No source verification.','Overly confident language.','Generic audience assumptions.']};}
function makePlaybook(name, idx){return {id:'playbook-'+idx,title:name,type:'Operating Playbook',objective:`Execute ${name.toLowerCase()} consistently using AI as a drafting, structuring, and review assistant.`,tools:idx%2?'Perplexity + NotebookLM':'Claude + ChatGPT',difficulty:idx<15?'Beginner':idx<35?'Intermediate':'Advanced',workflow:['Define output and audience.','Prepare clean inputs and remove restricted information.','Run generation prompt with strict structure.','Run critique prompt for missing risks and weak claims.','Revise manually and validate facts before circulation.'],prompt:`Build a ${name} output from the material below. Use context, key findings, implications, risks, next steps, and open questions. Use direct institutional language. Do not invent facts.`,advanced:`Act as a skeptical senior reviewer of this ${name}. Identify unsupported claims, unclear logic, hidden risks, excessive confidence, and missing follow-up questions.`,qc:['Check source dates.','Validate numerical claims.','Review compliance-sensitive wording.','Confirm audience fit.'],mistakes:['Skipping input cleanup.','Relying on AI for facts without sources.','Using output without review.','Not adapting tone.']};}
function makeModule(name,type,idx){return {id:type.toLowerCase().replaceAll(' ','-')+'-'+idx,title:name,type,objective:`Use AI to improve ${name.toLowerCase()} with a repeatable process and clear quality control.`,tools:['Claude','ChatGPT','Gemini'][idx%3],difficulty:idx<20?'Beginner':idx<38?'Intermediate':'Advanced',workflow:['Define the pain point and desired output.','Provide a sample style or format.','Generate structured first version.','Ask for critique and improvement.','Apply human judgment before reuse.'],prompt:`Help me with ${name}. Convert raw material into a professional output with clear structure, direct language, and a quality-control checklist. Do not add unsupported claims.`,advanced:`Improve the ${name} output for senior investment professionals. Make it sharper, less generic, more concise, and better structured. Highlight missing evidence.`,qc:['Check clarity.','Check evidence.','Check tone.','Check audience fit.'],mistakes:['Generic instructions.','No examples.','No review.','Overstated conclusions.']};}
function makeCompliance(name,idx){return {id:'compliance-'+idx,title:name,type:'Quality & Compliance',objective:`Control ${name.toLowerCase()} risk when using AI in professional workflows.`,tools:'All AI tools',difficulty:idx<20?'Beginner':idx<40?'Intermediate':'Advanced',workflow:['Classify sensitivity.','Remove restricted information.','Run AI for structure or draft only.','Verify facts.','Apply final human review.'],prompt:`Review this draft for ${name.toLowerCase()} risk. Identify sensitive information, unsupported claims, overly strong language, missing disclaimers, and required human verification.`,advanced:`Rewrite the unsafe language into safer, more precise institutional wording while preserving the business point.`,qc:['No confidential data.','No unsupported claims.','No fake sources.','No guaranteed-return language.'],mistakes:['Treating AI as compliance approval.','Using unverified facts.','Leaving client identifiers.','Overconfident wording.']};}

const topicsData=topicNames.map(makeTopic);
const promptLibrary=Array.from({length:100},(_,i)=>makePrompt(promptCategories[i%promptCategories.length],i));
const playbooksData=playbookNames.map(makePlaybook);
const workflowData=playbookNames.map((n,i)=>({...makePlaybook(n+' Workflow',i),id:'workflow-'+i,type:'Daily Workflow',timeSaved:`${20+(i%7)*10} minutes`}));
const presentationsData=presentationNames.map((n,i)=>makeModule(n,'Presentation & Writing',i));
const codingData=codingNames.map((n,i)=>makeModule(n,'Coding & Automation',i));
const knowledgeData=knowledgeNames.map((n,i)=>makeModule(n,'Knowledge Management',i));
const complianceData=complianceNames.map(makeCompliance);

let currentView='home';
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('-translate-x-full');document.getElementById('mobile-overlay').classList.toggle('hidden');}
function tag(label, cls='bg-slate-100 text-slate-700 border-slate-200'){return `<span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-semibold ${cls}">${label}</span>`;}
async function copyText(text, btn){try{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();const old=btn.innerHTML;btn.innerHTML='<i class="fas fa-check text-green-600"></i> Copied';setTimeout(()=>btn.innerHTML=old,1400);}catch(e){}}
function renderNavigation(){document.getElementById('nav-links').innerHTML=navigationConfig.map(item=>`<a href="#" data-target="${item.id}" onclick="switchView('${item.id}')" class="flex items-center px-6 py-3 text-sm font-medium border-l-4 border-transparent hover:bg-btg-light transition-colors text-blue-100"><i class="fas ${item.icon} w-6 text-center mr-3 opacity-80"></i>${item.label}</a>`).join('');}
function switchView(viewId){currentView=viewId;document.querySelectorAll('#nav-links a').forEach(link=>{if(link.dataset.target===viewId){link.classList.add('bg-btg-light','text-white','border-l-4','border-white');link.classList.remove('text-blue-100','border-transparent');}else{link.classList.remove('bg-btg-light','text-white','border-l-4','border-white');link.classList.add('text-blue-100','border-transparent');}});if(window.innerWidth<768&&!document.getElementById('sidebar').classList.contains('-translate-x-full'))toggleSidebar();document.getElementById('global-search').value='';renderContent(viewId);}
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('detail-modal').classList.remove('hidden');}
function closeModal(){document.getElementById('detail-modal').classList.add('hidden');}
function itemCard(item){return `<div class="searchable-item bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow cursor-pointer group" onclick="showItem('${item.id}')"><div class="flex items-start justify-between gap-4 mb-3"><div><div class="flex flex-wrap gap-2 mb-3">${tag(item.type||item.category||'Module')}${tag(item.difficulty||'Intermediate',item.difficulty==='Advanced'?'bg-purple-50 text-purple-800 border-purple-200':item.difficulty==='Beginner'?'bg-green-50 text-green-800 border-green-200':'bg-blue-50 text-blue-800 border-blue-200')}</div><h3 class="text-lg font-bold text-gray-800 group-hover:text-btg-blue transition-colors leading-tight">${item.title}</h3></div><i class="fas fa-chevron-right text-gray-300 group-hover:text-btg-blue mt-2"></i></div><p class="text-sm text-gray-600 line-clamp-3 mb-4">${item.objective||''}</p><div class="flex items-center justify-between border-t border-gray-100 pt-3 text-xs text-gray-500"><span><i class="fas fa-robot mr-1 text-btg-blue"></i>${item.tools||'Multiple tools'}</span>${item.timeSaved?`<span class="font-semibold text-green-700">${item.timeSaved} saved</span>`:`<span class="font-semibold text-btg-blue">Open module</span>`}</div></div>`;}
function showItem(id){const all=[...rolesData,...topicsData,...promptLibrary,...workflowData,...playbooksData,...presentationsData,...codingData,...knowledgeData,...complianceData,...tools];const item=all.find(x=>x.id===id||x.title===id);if(!item)return;const promptId='prompt-'+String(item.id||item.title).replaceAll(' ','-');const advId='adv-'+String(item.id||item.title).replaceAll(' ','-');openModal(`<div class="bg-btg-blue text-white p-7 rounded-t-xl"><div class="flex flex-wrap gap-2 mb-3">${tag(item.type||item.category||'Module','bg-blue-900 text-blue-100 border-blue-800')}${tag(item.difficulty||'Intermediate','bg-white/10 text-white border-white/20')}${item.family?tag(item.family,'bg-white/10 text-white border-white/20'):''}</div><h2 class="text-2xl md:text-3xl font-bold leading-tight pr-10">${item.title}</h2><p class="text-blue-200 mt-2">${item.objective||''}</p></div><div class="p-7 bg-white rounded-b-xl"><div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-7"><div class="lg:col-span-2 space-y-6"><section><h3 class="font-bold text-gray-800 text-lg border-b pb-2 mb-3">Operating workflow</h3><ol class="list-decimal list-inside space-y-2 text-sm text-gray-700">${(item.workflow||[]).map(s=>`<li>${s}</li>`).join('')}</ol></section><section class="relative group"><h3 class="font-bold text-gray-800 text-lg mb-2">Copy-ready prompt</h3><pre id="${promptId}" class="text-sm font-mono whitespace-pre-wrap bg-slate-50 border border-gray-200 rounded-lg p-5 text-gray-800 leading-relaxed">${item.prompt||''}</pre><button onclick="copyText(document.getElementById('${promptId}').innerText,this)" class="absolute top-10 right-3 bg-white border border-gray-300 shadow-sm font-medium text-gray-600 px-3 py-1.5 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity no-print"><i class="far fa-copy mr-1"></i>Copy</button></section><section class="relative group"><h3 class="font-bold text-gray-800 text-lg mb-2">Advanced prompt</h3><pre id="${advId}" class="text-sm font-mono whitespace-pre-wrap bg-blue-50 border border-blue-100 rounded-lg p-5 text-blue-950 leading-relaxed">${item.advanced||''}</pre><button onclick="copyText(document.getElementById('${advId}').innerText,this)" class="absolute top-10 right-3 bg-white border border-gray-300 shadow-sm font-medium text-gray-600 px-3 py-1.5 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity no-print"><i class="far fa-copy mr-1"></i>Copy</button></section></div><aside class="space-y-5"><div class="bg-slate-50 border border-gray-200 rounded-xl p-5"><h4 class="font-bold text-xs uppercase tracking-wide text-gray-500 mb-2">Recommended tools</h4><p class="font-semibold text-gray-800">${item.tools||'Multiple tools'}</p></div><div class="bg-green-50 border border-green-100 rounded-xl p-5"><h4 class="font-bold text-green-800 mb-3 text-xs uppercase tracking-wide">QC checklist</h4><ul class="space-y-2 text-sm text-green-900">${(item.qc||[]).map(x=>`<li class="flex gap-2"><i class="fas fa-check mt-1 text-green-700 text-xs"></i><span>${x}</span></li>`).join('')}</ul></div><div class="bg-red-50 border border-red-100 rounded-xl p-5"><h4 class="font-bold text-red-800 mb-3 text-xs uppercase tracking-wide">Common mistakes</h4><ul class="space-y-2 text-sm text-red-900">${(item.mistakes||[]).map(x=>`<li class="flex gap-2"><i class="fas fa-triangle-exclamation mt-1 text-red-700 text-xs"></i><span>${x}</span></li>`).join('')}</ul></div></aside></div><div class="border-t border-gray-200 pt-5 mt-6"><h4 class="font-bold text-gray-800 mb-3 text-xs uppercase tracking-wide">External Learning Queries</h4><div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs"><div class="bg-red-50 text-red-900 p-3 rounded border border-red-100"><i class="fab fa-youtube text-red-600 mr-1.5"></i><strong>YouTube:</strong> "${item.title} AI workflow tutorial"</div><div class="bg-orange-50 text-orange-900 p-3 rounded border border-orange-100"><i class="fas fa-envelope-open-text text-orange-600 mr-1.5"></i><strong>Substack:</strong> "${item.title} AI finance workflow"</div><div class="bg-gray-100 text-gray-800 p-3 rounded border border-gray-200"><i class="fab fa-x-twitter text-black mr-1.5"></i><strong>X:</strong> follow operators sharing ${item.title.toLowerCase()} workflows</div></div></div><div class="pt-6 mt-6 border-t border-gray-200 flex flex-wrap gap-3 no-print"><button onclick="window.print()" class="px-4 py-2 bg-slate-100 border border-slate-200 rounded-lg font-semibold text-slate-700"><i class="fas fa-print mr-2"></i>Print module</button><button onclick="copyText(document.getElementById('${promptId}').innerText,this)" class="px-4 py-2 bg-btg-blue text-white rounded-lg font-semibold"><i class="far fa-copy mr-2"></i>Copy primary prompt</button></div></div>`);}
function statCard(title,value,icon,target){return `<div onclick="switchView('${target}')" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md cursor-pointer transition-shadow"><div class="flex items-center justify-between mb-2"><h3 class="font-bold text-gray-700">${title}</h3><i class="fas ${icon} text-btg-blue text-xl"></i></div><div class="text-3xl font-extrabold text-btg-blue">${value}</div><p class="text-xs text-gray-500 mt-1">Complete content modules</p></div>`;}
function headerBlock(title,subtitle){return `<div class="mb-6 border-b border-gray-200 pb-4"><h2 class="text-3xl font-extrabold text-btg-blue tracking-tight">${title}</h2><p class="text-gray-600 mt-2 text-lg">${subtitle}</p></div>`;}
function filterBar(data){const diffs=[...new Set(data.map(x=>x.difficulty).filter(Boolean))];return `<div class="bg-white border border-gray-200 rounded-xl p-4 mb-5 flex flex-col md:flex-row gap-3 items-start md:items-center justify-between no-print"><div class="text-sm text-gray-600"><strong>${data.length}</strong> items in this section</div><div class="flex flex-wrap gap-2"><button onclick="clearFilters()" class="px-3 py-2 rounded-lg border border-gray-200 bg-slate-50 font-semibold text-xs">Clear filters</button>${diffs.map(d=>`<button onclick="quickFilter('${d}')" class="px-3 py-2 rounded-lg border border-gray-200 bg-white font-semibold text-xs hover:bg-blue-50">${d}</button>`).join('')}</div></div>`;}
function renderGrid(title,subtitle,data){return `<div class="max-w-7xl mx-auto">${headerBlock(title,subtitle)}${filterBar(data)}<div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">${data.map(itemCard).join('')}</div></div>`;}
function renderHome(){const featured=[rolesData[0],rolesData[2],playbooksData[2],complianceData[9]];return `<div class="max-w-7xl mx-auto space-y-8"><section class="bg-white border border-gray-200 rounded-2xl p-8 md:p-10 shadow-sm relative overflow-hidden"><div class="absolute -top-24 -right-24 w-96 h-96 bg-blue-50 rounded-full blur-3xl opacity-80"></div><div class="relative z-10 max-w-4xl"><div class="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 text-btg-blue border border-blue-100 text-xs font-bold uppercase tracking-wide mb-4">Internal AI training hub</div><h1 class="text-3xl md:text-5xl font-extrabold text-btg-blue tracking-tight mb-4">BTG Pactual – AI Trainer Lab</h1><p class="text-lg text-gray-600 leading-relaxed">A practical training platform for investment professionals. This preview includes role-specific trails with distinct workflows, prompts, mistakes, and review checklists.</p><div class="mt-7 flex flex-wrap gap-3"><button onclick="switchView('roles')" class="px-5 py-3 bg-btg-blue text-white rounded-lg font-semibold shadow-sm hover:bg-blue-950"><i class="fas fa-user-tie mr-2"></i>Open Role Trails</button><button onclick="switchView('prompts')" class="px-5 py-3 bg-white border border-btg-blue text-btg-blue rounded-lg font-semibold hover:bg-blue-50"><i class="fas fa-terminal mr-2"></i>Open 100 Prompts</button><button onclick="openPathBuilder()" class="px-5 py-3 bg-slate-100 border border-slate-200 text-slate-800 rounded-lg font-semibold hover:bg-slate-200"><i class="fas fa-route mr-2"></i>Build Path</button></div></div></section><section class="grid grid-cols-2 lg:grid-cols-5 gap-4">${statCard('Role Trails',rolesData.length,'fa-user-tie','roles')}${statCard('Topic Trails',topicsData.length,'fa-book','topics')}${statCard('Prompts',promptLibrary.length,'fa-terminal','prompts')}${statCard('Playbooks',playbooksData.length,'fa-map','playbooks')}${statCard('QC Modules',complianceData.length,'fa-shield-halved','compliance')}</section><section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm"><h2 class="text-xl font-bold text-gray-800 mb-4">Role-specific modules to test</h2><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">${featured.map(itemCard).join('')}</div></section></div>`;}
function renderTools(){return renderGrid('AI Tools Deep Dive','Capabilities, limitations, and practical setup guidance for investment professionals.',tools.map((x,i)=>({id:x.title,...x})));}
function externalCard(item){return `<div class="searchable-item bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow flex flex-col"><div class="flex flex-wrap gap-2 mb-3">${tag(item.type)}${tag(item.category,'bg-blue-50 text-blue-800 border-blue-200')}${tag(item.level,item.level==='Advanced'?'bg-purple-50 text-purple-800 border-purple-200':item.level==='Beginner'?'bg-green-50 text-green-800 border-green-200':'bg-slate-100 text-slate-700 border-slate-200')}</div><h3 class="text-lg font-bold text-gray-800 leading-tight mb-2">${item.title}</h3><p class="text-xs font-semibold text-gray-500 mb-3">${item.source}</p><p class="text-sm text-gray-700 mb-3"><strong>Use case:</strong> ${item.useCase}</p><p class="text-sm text-gray-600 line-clamp-3 mb-4">${item.why}</p><div class="flex flex-wrap gap-1.5 mb-4">${(item.tags||[]).map(t=>`<span class="px-2 py-1 rounded bg-slate-100 text-slate-600 text-[11px] font-semibold">${t}</span>`).join('')}</div><div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between gap-3"><button onclick="window.open('${item.url}','_blank','noopener,noreferrer')" class="px-4 py-2 bg-btg-blue text-white rounded-lg font-semibold text-xs"><i class="fas fa-arrow-up-right-from-square mr-1.5"></i>Open resource</button><button onclick="copyText('${item.url}', this)" class="px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg font-semibold text-xs text-slate-700"><i class="far fa-copy mr-1"></i>Copy link</button></div></div>`;}
function renderExternalContent(){const cats=[...new Set(externalContent.map(x=>x.category))];return `<div class="max-w-7xl mx-auto">${headerBlock('External Learning Hub','Curated real resources: direct YouTube videos, official docs, Substack/newsletters, and X profiles focused on AI tools and workflows.')}<div class="bg-white border border-gray-200 rounded-xl p-4 mb-5 flex flex-col gap-3 no-print"><div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3"><div class="text-sm text-gray-600"><strong>${externalContent.length}</strong> verified external resources</div><div class="flex flex-wrap gap-2"><button onclick="clearFilters()" class="px-3 py-2 rounded-lg border border-gray-200 bg-slate-50 font-semibold text-xs">Clear filters</button><button onclick="quickFilter('YouTube Video')" class="px-3 py-2 rounded-lg border border-red-200 bg-red-50 text-red-800 font-semibold text-xs">YouTube</button><button onclick="quickFilter('Official')" class="px-3 py-2 rounded-lg border border-blue-200 bg-blue-50 text-blue-800 font-semibold text-xs">Official docs</button><button onclick="quickFilter('Substack')" class="px-3 py-2 rounded-lg border border-orange-200 bg-orange-50 text-orange-800 font-semibold text-xs">Substack/blogs</button><button onclick="quickFilter('X Profile')" class="px-3 py-2 rounded-lg border border-gray-300 bg-gray-100 text-gray-800 font-semibold text-xs">X profiles</button></div></div><div class="flex flex-wrap gap-2">${cats.map(c=>`<button onclick="quickFilter('${c}')" class="px-3 py-1.5 rounded-full border border-gray-200 bg-white font-semibold text-xs hover:bg-blue-50">${c}</button>`).join('')}</div></div><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">${externalContent.map(externalCard).join('')}</div></div>`;}
function openPathBuilder(){openModal(`<div class="bg-btg-blue text-white p-7 rounded-t-xl"><h2 class="text-2xl font-bold">Build My Learning Path</h2><p class="text-blue-200 mt-2">Choose a profile and start with high-impact role-specific modules.</p></div><div class="p-7 bg-white rounded-b-xl"><div class="grid grid-cols-1 md:grid-cols-3 gap-4">${['Portfolio Manager','Equity Analyst','Credit Analyst','Wealth Manager','Trader','CIO'].map(r=>`<div class="border border-gray-200 rounded-xl p-5 hover:shadow-md cursor-pointer" onclick="closeModal(); switchView('roles'); document.getElementById('global-search').value='${r}'; applySearch('${r}')"><h3 class="font-bold text-btg-blue mb-2">${r}</h3><p class="text-sm text-gray-600">Open role-specific prompts, workflows, QC checks, and common mistakes.</p></div>`).join('')}</div></div>`);}
function renderContent(viewId){const c=document.getElementById('main-container'); if(viewId==='home')c.innerHTML=renderHome(); if(viewId==='tools')c.innerHTML=renderTools(); if(viewId==='external')c.innerHTML=renderExternalContent(); if(viewId==='roles')c.innerHTML=renderGrid('50 Learning Trails by Role','Each role now has distinct prompts, workflows, review logic, common mistakes, and recommended tools.',rolesData); if(viewId==='topics')c.innerHTML=renderGrid('50 Learning Trails by Topic','Task-level training modules for investment professionals.',topicsData); if(viewId==='prompts')c.innerHTML=renderGrid('100 Master Prompt Library','Copy-ready institutional prompts with advanced review prompts and quality-control checks.',promptLibrary); if(viewId==='workflows')c.innerHTML=renderGrid('50 Daily Workflow Ideas','Practical AI use cases for day-to-day work.',workflowData); if(viewId==='playbooks')c.innerHTML=renderGrid('50 Operating Playbooks','Operating manuals for recurring investment and client-facing tasks.',playbooksData); if(viewId==='presentations')c.innerHTML=renderGrid('50 Presentations & Writing Modules','Decks, notes, executive summaries, client language, and narrative structure.',presentationsData); if(viewId==='coding')c.innerHTML=renderGrid('50 Coding & Automation Modules','A practical non-coder track for scripts, dashboards, and automation.',codingData); if(viewId==='knowledge')c.innerHTML=renderGrid('50 Knowledge Management Modules','Research libraries, prompt vaults, notes, archives, and retrieval.',knowledgeData); if(viewId==='compliance')c.innerHTML=renderGrid('50 Quality & Compliance Modules','Risk controls, safe prompting, review workflows, and publishing checklists.',complianceData);}
function quickFilter(term){document.getElementById('global-search').value=term;applySearch(term)} function clearFilters(){document.getElementById('global-search').value='';applySearch('')} function applySearch(term){const q=term.toLowerCase();document.querySelectorAll('.searchable-item').forEach(el=>el.classList.toggle('search-hidden',q&&!el.innerText.toLowerCase().includes(q)));}
document.getElementById('global-search').addEventListener('input',e=>applySearch(e.target.value));
document.addEventListener('DOMContentLoaded',()=>{renderNavigation();switchView('home');console.assert(rolesData.length>=50,'Role trails must contain at least 50 roles.');console.assert(new Set(rolesData.map(r=>r.prompt)).size===rolesData.length,'Each role should have a unique prompt.');});
</script>
