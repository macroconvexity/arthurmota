async function copyText(text, btn) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'absolute';
      ta.style.left = '-999999px';
      document.body.prepend(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check text-green-600"></i> Copied';
    setTimeout(() => { btn.innerHTML = original; }, 1400);
  } catch(e) {}
}

  if (window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) toggleSidebar();
  document.getElementById('global-search').value = '';
  renderContent(viewId);
}

function renderNavigation() {
  document.getElementById('nav-links').innerHTML = navigationConfig.map(item => `
    <a href="#" data-target="${item.id}" onclick="switchView('${item.id}')" class="flex items-center px-6 py-3 text-sm font-medium border-l-4 border-transparent hover:bg-btg-light transition-colors text-blue-100">
      <i class="fas ${item.icon} w-6 text-center mr-3 opacity-80"></i>${item.label}
    </a>`).join('');
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('detail-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

function tag(label, cls='bg-slate-100 text-slate-700 border-slate-200') {
  return `<span class="inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-semibold ${cls}">${label}</span>`;
}

function itemCard(item, idx) {
  return `
    <div class="searchable-item bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow cursor-pointer group" onclick="showItem('${item.id}')">
      <div class="flex items-start justify-between gap-4 mb-3">
        <div>
          <div class="flex flex-wrap gap-2 mb-3">
            ${tag(item.type || item.category || 'Module')}
            ${tag(item.difficulty || 'Intermediate', item.difficulty === 'Advanced' ? 'bg-purple-50 text-purple-800 border-purple-200' : item.difficulty === 'Beginner' ? 'bg-green-50 text-green-800 border-green-200' : 'bg-blue-50 text-blue-800 border-blue-200')}
          </div>
          <h3 class="text-lg font-bold text-gray-800 group-hover:text-btg-blue transition-colors leading-tight">${item.title}</h3>
        </div>
        <i class="fas fa-chevron-right text-gray-300 group-hover:text-btg-blue mt-2"></i>
      </div>
      <p class="text-sm text-gray-600 line-clamp-3 mb-4">${item.objective || item.rule || ''}</p>
      <div class="flex items-center justify-between border-t border-gray-100 pt-3 text-xs text-gray-500">
        <span><i class="fas fa-robot mr-1 text-btg-blue"></i>${item.tools || 'Multiple AI tools'}</span>
        ${item.timeSaved ? `<span class="font-semibold text-green-700">${item.timeSaved} saved</span>` : `<span class="font-semibold text-btg-blue">Open module</span>`}
      </div>
    </div>`;
}

function showItem(id) {
  const all = [...rolesData, ...topicsData, ...promptLibrary, ...workflowData, ...playbooksData, ...presentationsData, ...codingData, ...knowledgeData, ...complianceData];
  const item = all.find(x => x.id === id);
  if (!item) return;
  const promptId = 'prompt-' + item.id;
  const advId = 'adv-' + item.id;
  const isCompliance = item.type === 'Quality & Compliance';
  openModal(`
    <div class="bg-btg-blue text-white p-7 rounded-t-xl">
      <div class="flex flex-wrap gap-2 mb-3">
        ${tag(item.type || item.category || 'Module', 'bg-blue-900 text-blue-100 border-blue-800')}
        ${tag(item.difficulty || 'Intermediate', 'bg-white/10 text-white border-white/20')}
      </div>
      <h2 class="text-2xl md:text-3xl font-bold leading-tight pr-10">${item.title}</h2>
      <p class="text-blue-200 mt-2">${item.objective || item.rule || ''}</p>
    </div>
    <div class="p-7 bg-white rounded-b-xl">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-7">
        <div class="lg:col-span-2 space-y-6">
          ${isCompliance ? `
            <section><h3 class="font-bold text-gray-800 text-lg border-b pb-2 mb-3">Unsafe example</h3><p class="text-sm text-red-900 bg-red-50 border border-red-100 rounded-lg p-4">${item.unsafe}</p></section>
            <section><h3 class="font-bold text-gray-800 text-lg border-b pb-2 mb-3">Safer version</h3><p class="text-sm text-green-900 bg-green-50 border border-green-100 rounded-lg p-4">${item.safer}</p></section>
          ` : `
            <section><h3 class="font-bold text-gray-800 text-lg border-b pb-2 mb-3">Operating workflow</h3><ol class="list-decimal list-inside space-y-2 text-sm text-gray-700">${(item.workflow || []).map(s => `<li>${s}</li>`).join('')}</ol></section>
          `}
          <section class="relative group">
            <div class="flex items-center justify-between mb-2"><h3 class="font-bold text-gray-800 text-lg">Copy-ready prompt</h3></div>
            <pre id="${promptId}" class="text-sm font-mono whitespace-pre-wrap bg-slate-50 border border-gray-200 rounded-lg p-5 text-gray-800 leading-relaxed">${item.prompt || ''}</pre>
            <button onclick="copyText(document.getElementById('${promptId}').innerText, this)" class="absolute top-10 right-3 bg-white border border-gray-300 shadow-sm font-medium text-gray-600 px-3 py-1.5 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity no-print"><i class="far fa-copy mr-1"></i>Copy</button>
          </section>
          ${item.advanced ? `<section class="relative group"><h3 class="font-bold text-gray-800 text-lg mb-2">Advanced prompt</h3><pre id="${advId}" class="text-sm font-mono whitespace-pre-wrap bg-blue-50 border border-blue-100 rounded-lg p-5 text-blue-950 leading-relaxed">${item.advanced}</pre><button onclick="copyText(document.getElementById('${advId}').innerText, this)" class="absolute top-10 right-3 bg-white border border-gray-300 shadow-sm font-medium text-gray-600 px-3 py-1.5 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity no-print"><i class="far fa-copy mr-1"></i>Copy</button></section>` : ''}
        </div>
        <aside class="space-y-5">
          <div class="bg-slate-50 border border-gray-200 rounded-xl p-5">
            <h4 class="font-bold text-xs uppercase tracking-wide text-gray-500 mb-2">Recommended tools</h4>
            <p class="font-semibold text-gray-800">${item.tools || 'Multiple AI tools'}</p>
          </div>
          <div class="bg-green-50 border border-green-100 rounded-xl p-5">
            <h4 class="font-bold text-green-800 mb-3 text-xs uppercase tracking-wide">QC checklist</h4>
            <ul class="space-y-2 text-sm text-green-900">${(item.qc || []).map(x => `<li class="flex gap-2"><i class="fas fa-check mt-1 text-green-700 text-xs"></i><span>${x}</span></li>`).join('')}</ul>
          </div>
          <div class="bg-red-50 border border-red-100 rounded-xl p-5">
            <h4 class="font-bold text-red-800 mb-3 text-xs uppercase tracking-wide">Common mistakes</h4>
            <ul class="space-y-2 text-sm text-red-900">${(item.mistakes || []).map(x => `<li class="flex gap-2"><i class="fas fa-triangle-exclamation mt-1 text-red-700 text-xs"></i><span>${x}</span></li>`).join('')}</ul>
          </div>
        </aside>
      </div>
      ${externalBlock(item.title)}
      <div class="pt-6 mt-6 border-t border-gray-200 flex flex-wrap gap-3 no-print">
        <button onclick="window.print()" class="px-4 py-2 bg-slate-100 border border-slate-200 rounded-lg font-semibold text-slate-700"><i class="fas fa-print mr-2"></i>Print module</button>
        <button onclick="copyText(document.getElementById('${promptId}').innerText, this)" class="px-4 py-2 bg-btg-blue text-white rounded-lg font-semibold"><i class="far fa-copy mr-2"></i>Copy primary prompt</button>
      </div>
    </div>`);
}

function openPathBuilder() {
  openModal(`
    <div class="bg-btg-blue text-white p-7 rounded-t-xl">
      <h2 class="text-2xl font-bold">Build My Learning Path</h2>
      <p class="text-blue-200 mt-2">Choose a profile and start with the highest-impact modules.</p>
    </div>
    <div class="p-7 bg-white rounded-b-xl">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        ${['AI Beginner','Portfolio Manager','Equity Analyst','Credit Analyst','Wealth Manager','Team Head'].map((r,i) => `<div class="border border-gray-200 rounded-xl p-5 hover:shadow-md cursor-pointer" onclick="closeModal(); switchView('roles')"><h3 class="font-bold text-btg-blue mb-2">${r}</h3><p class="text-sm text-gray-600">Start with core tools, daily workflows, prompt templates, and quality-control routines.</p></div>`).join('')}
      </div>
    </div>`);
}

function statCard(title, value, icon, target) {
  return `<div onclick="switchView('${target}')" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md cursor-pointer transition-shadow"><div class="flex items-center justify-between mb-2"><h3 class="font-bold text-gray-700">${title}</h3><i class="fas ${icon} text-btg-blue text-xl"></i></div><div class="text-3xl font-extrabold text-btg-blue">${value}</div><p class="text-xs text-gray-500 mt-1">Complete content modules</p></div>`;
}

function renderHome() {
  const featured = [playbooksData[2], promptLibrary[0], workflowData[7], complianceData[9]];
  currentData = [];
  return `
    <div class="max-w-7xl mx-auto space-y-8">
      <section class="bg-white border border-gray-200 rounded-2xl p-8 md:p-10 shadow-sm relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-blue-50 rounded-full blur-3xl opacity-80"></div>
        <div class="relative z-10 max-w-4xl">
          <div class="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 text-btg-blue border border-blue-100 text-xs font-bold uppercase tracking-wide mb-4">Internal AI training hub</div>
          <h1 class="text-3xl md:text-5xl font-extrabold text-btg-blue tracking-tight mb-4">BTG Pactual – AI Trainer Lab</h1>
          <p class="text-lg text-gray-600 leading-relaxed">A content-rich training platform for investment professionals. Built around real workflows: prompts, role trails, topic trails, operating playbooks, writing modules, coding support, knowledge management, and quality control.</p>
          <div class="mt-7 flex flex-wrap gap-3">
            <button onclick="switchView('prompts')" class="px-5 py-3 bg-btg-blue text-white rounded-lg font-semibold shadow-sm hover:bg-blue-950"><i class="fas fa-terminal mr-2"></i>Open 100 Prompts</button>
            <button onclick="switchView('playbooks')" class="px-5 py-3 bg-white border border-btg-blue text-btg-blue rounded-lg font-semibold hover:bg-blue-50"><i class="fas fa-map mr-2"></i>Open Playbooks</button>
            <button onclick="openPathBuilder()" class="px-5 py-3 bg-slate-100 border border-slate-200 text-slate-800 rounded-lg font-semibold hover:bg-slate-200"><i class="fas fa-route mr-2"></i>Build Path</button>
          </div>
        </div>
      </section>
      <section class="grid grid-cols-2 lg:grid-cols-5 gap-4">
        ${statCard('Role Trails', rolesData.length, 'fa-user-tie', 'roles')}
        ${statCard('Topic Trails', topicsData.length, 'fa-book', 'topics')}
        ${statCard('Prompts', promptLibrary.length, 'fa-terminal', 'prompts')}
        ${statCard('Playbooks', playbooksData.length, 'fa-map', 'playbooks')}
        ${statCard('QC Modules', complianceData.length, 'fa-shield-halved', 'compliance')}
      </section>
      <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
          <h2 class="text-xl font-bold text-gray-800 mb-4">Top workflows to try today</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${featured.map((x,i) => itemCard(x,i)).join('')}</div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
          <h2 class="text-xl font-bold text-gray-800 mb-4">AI tool picker</h2>
          <div class="space-y-3 text-sm text-gray-700">
            <div class="p-3 bg-slate-50 border rounded-lg"><strong>Long document?</strong><br>Use Claude or NotebookLM.</div>
            <div class="p-3 bg-slate-50 border rounded-lg"><strong>CSV / calculation?</strong><br>Use ChatGPT Advanced Data Analysis.</div>
            <div class="p-3 bg-slate-50 border rounded-lg"><strong>Public web facts?</strong><br>Use Perplexity.</div>
            <div class="p-3 bg-slate-50 border rounded-lg"><strong>Reusable knowledge?</strong><br>Use Obsidian, NotebookLM, or Projects.</div>
          </div>
        </div>
      </section>
    </div>`;
}

function renderTools() {
  currentData = [];
  return `
    <div class="max-w-7xl mx-auto space-y-6">
      ${headerBlock('AI Tools Deep Dive','Capabilities, limitations, and practical setup guidance for investment professionals.')}
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
        ${tools.map((t,i) => `
          <div class="searchable-item bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <h3 class="text-lg font-bold text-btg-blue mb-2">${t.name}</h3>
            <p class="text-sm text-gray-600 mb-4 line-clamp-3"><strong>Best for:</strong> ${t.bestFor}</p>
            <div class="space-y-3 text-sm">
              <div class="bg-green-50 border border-green-100 rounded-lg p-3"><strong class="text-green-800">Use for</strong><br>${t.bestFor}</div>
              <div class="bg-red-50 border border-red-100 rounded-lg p-3"><strong class="text-red-800">Avoid</strong><br>${t.avoid}</div>
              <div class="bg-blue-50 border border-blue-100 rounded-lg p-3"><strong class="text-blue-800">Setup</strong><br>${t.setup}</div>
            </div>
            ${externalBlock(t.name)}
          </div>`).join('')}
      </div>
    </div>`;
}

function headerBlock(title, subtitle) {
  return `<div class="mb-6 border-b border-gray-200 pb-4"><h2 class="text-3xl font-extrabold text-btg-blue tracking-tight">${title}</h2><p class="text-gray-600 mt-2 text-lg">${subtitle}</p></div>`;
}

function filterBar(data, view) {
  const types = [...new Set(data.map(x => x.type || x.category || 'Module'))];
  const diffs = [...new Set(data.map(x => x.difficulty).filter(Boolean))];
  return `
    <div class="bg-white border border-gray-200 rounded-xl p-4 mb-5 flex flex-col md:flex-row gap-3 items-start md:items-center justify-between no-print">
      <div class="text-sm text-gray-600"><strong>${data.length}</strong> items in this section</div>
      <div class="flex flex-wrap gap-2">
        <button onclick="clearFilters()" class="px-3 py-2 rounded-lg border border-gray-200 bg-slate-50 font-semibold text-xs">Clear filters</button>
        ${types.slice(0,5).map(t => `<button onclick="quickFilter('${t}')" class="px-3 py-2 rounded-lg border border-gray-200 bg-white font-semibold text-xs hover:bg-blue-50">${t}</button>`).join('')}
        ${diffs.map(d => `<button onclick="quickFilter('${d}')" class="px-3 py-2 rounded-lg border border-gray-200 bg-white font-semibold text-xs hover:bg-blue-50">${d}</button>`).join('')}
      </div>
    </div>`;
}

function renderGrid(title, subtitle, data) {
  currentData = data;
  return `
    <div class="max-w-7xl mx-auto">
      ${headerBlock(title, subtitle)}
      ${filterBar(data)}
      <div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
        ${data.map(itemCard).join('')}
      </div>
    </div>`;
}

function renderContent(viewId) {
  const c = document.getElementById('main-container');
  if (viewId === 'home') c.innerHTML = renderHome();
  if (viewId === 'tools') c.innerHTML = renderTools();
  if (viewId === 'roles') c.innerHTML = renderGrid('50 Learning Trails by Role','Detailed role-based AI training paths with prompts, workflows, mistakes, and QC routines.', rolesData);
  if (viewId === 'topics') c.innerHTML = renderGrid('50 Learning Trails by Topic','Task-level training modules for the real workflows used by investment professionals.', topicsData);
  if (viewId === 'prompts') c.innerHTML = renderGrid('100 Master Prompt Library','Copy-ready institutional prompts with advanced review prompts and quality-control checks.', promptLibrary);
  if (viewId === 'workflows') c.innerHTML = renderGrid('50 Daily Workflow Ideas','Practical AI use cases for day-to-day work, with estimated time saved and execution steps.', workflowData);
  if (viewId === 'playbooks') c.innerHTML = renderGrid('50 Operating Playbooks','End-to-end operating manuals for recurring investment and client-facing tasks.', playbooksData);
  if (viewId === 'presentations') c.innerHTML = renderGrid('50 Presentations & Writing Modules','Training modules for decks, notes, executive summaries, client language, and narrative structure.', presentationsData);
  if (viewId === 'coding') c.innerHTML = renderGrid('50 Coding & Automation Modules','A practical non-coder track for using AI to build scripts, dashboards, tools, and automation.', codingData);
  if (viewId === 'knowledge') c.innerHTML = renderGrid('50 Knowledge Management Modules','Systems for research libraries, prompt vaults, notes, archives, projects, and source-grounded retrieval.', knowledgeData);
  if (viewId === 'compliance') c.innerHTML = renderGrid('50 Quality & Compliance Modules','Risk controls, safe prompting, review workflows, and publishing checklists.', complianceData);
}

function quickFilter(term) {
  document.getElementById('global-search').value = term;
  applySearch(term);
}
function clearFilters() {
  document.getElementById('global-search').value = '';
  applySearch('');
}
function applySearch(term) {
  const q = term.toLowerCase();
  document.querySelectorAll('.searchable-item').forEach(el => {
    el.classList.toggle('search-hidden', q && !el.innerText.toLowerCase().includes(q));
  });
}
document.getElementById('global-search').addEventListener('input', e => applySearch(e.target.value));

document.addEventListener('DOMContentLoaded', () => {
  renderNavigation();
  switchView('home');
});
</script>
</body>
</html>
