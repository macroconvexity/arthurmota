            {yTicks.map((t, i) => <g key={i}><line x1={pad.left} x2={width-pad.right} y1={sy(t)} y2={sy(t)} stroke="#e2e8f0" strokeDasharray="3 3"/><text x={pad.left-10} y={sy(t)+4} textAnchor="end" fontSize="11" fill="#64748b">{moneyAxis(t)}</text></g>)}
            {xTicks.map((t, i) => <g key={i}><line x1={sx(t)} x2={sx(t)} y1={pad.top} y2={height-pad.bottom} stroke="#f1f5f9"/><text x={sx(t)} y={height-16} textAnchor="middle" fontSize="11" fill="#64748b">{t}</text></g>)}
            <path d={band('p95','p5')} fill="#cbd5e1" opacity="0.45" />
            <path d={band('p75','p25')} fill="#94a3b8" opacity="0.45" />
            <path d={line('p50')} fill="none" stroke="#0B2859" strokeWidth="3" />
            <path d={line('det')} fill="none" stroke="#a98a4c" strokeWidth="2.5" strokeDasharray="7 6" />
            <line x1={pad.left} x2={pad.left} y1={pad.top} y2={height-pad.bottom} stroke="#cbd5e1" />
            <line x1={pad.left} x2={width-pad.right} y1={height-pad.bottom} y2={height-pad.bottom} stroke="#cbd5e1" />
            <text x={width/2} y={height-2} textAnchor="middle" fontSize="12" fill="#64748b">Years</text>
            <text x="20" y={height/2} textAnchor="middle" fontSize="12" fill="#64748b" transform={`rotate(-90 20 ${height/2})`}>Wealth (USD)</text>
          </svg>
          <div className="flex flex-wrap gap-6 justify-center mt-3 text-sm text-slate-600">
            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{backgroundColor:'#0B2859'}}></span>Median</span>
            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{backgroundColor:'#94a3b8'}}></span>25–75th percentile</span>
            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{backgroundColor:'#cbd5e1'}}></span>5–95th percentile</span>
            <span className="flex items-center gap-2"><span className="w-8 h-0.5" style={{backgroundColor:'#a98a4c', borderTop:'2px dashed #a98a4c'}}></span>Deterministic (no vol)</span>
          </div>
        </div>
      );
    };

    function runSelfTests() {
      console.group('Portfolio Allocation Lab self-tests');
      console.assert(ASSETS.length === 9, 'Expected 9 assets');
      console.assert(Object.values(BASE_PROFILES).every(w => w.length === ASSETS.length), 'Every base profile must have 9 weights');
      console.assert(Math.abs(BASE_PROFILES.Balanced.reduce((a,b)=>a+b,0)-100) < 0.01, 'Balanced profile should sum to 100');
      console.assert(INITIAL_CORR_MATRIX.length === ASSETS.length && INITIAL_CORR_MATRIX.every(r => r.length === ASSETS.length), 'Correlation matrix must be 9x9');
      console.assert(typeof window.Recharts === 'undefined' || typeof window.Recharts === 'object', 'Recharts is optional and no longer required');
      console.assert(typeof XLSX === 'object', 'XLSX library should be loaded for Excel export');
      console.groupEnd();
    }

    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isExportingPDF, setIsExportingPDF] = useState(false);
      const [isExportingExcel, setIsExportingExcel] = useState(false);
      const [fiDecomposition, setFiDecomposition] = useState(INITIAL_FI_DECOMPOSITION);
      const [eqDecomposition, setEqDecomposition] = useState(INITIAL_EQ_DECOMPOSITION);
      const [otherReturns, setOtherReturns] = useState(BASE_RETURNS_OTHER);
      const [correlationOverrides, setCorrelationOverrides] = useState({});
      const [dynBaseProfile, setDynBaseProfile] = useState('Balanced');
      const [dynTargetRet, setDynTargetRet] = useState(DEFAULT_DYNAMIC_RET);
      const [dynTargetVol, setDynTargetVol] = useState(DEFAULT_DYNAMIC_VOL);
      const [lastActiveConstraint, setLastActiveConstraint] = useState('ret');
      const [dynWeights, setDynWeights] = useState([...BASE_PROFILES.Balanced]);
      const [customWeights, setCustomWeights] = useState([...DEFAULT_CUSTOM_WEIGHTS]);
      const [simProfile, setSimProfile] = useState('Balanced');
      const [simCapital, setSimCapital] = useState(1000000);
      const [simPaths, setSimPaths] = useState(1000);
      const [wealthCapital, setWealthCapital] = useState(1000000);
      const [wealthYears, setWealthYears] = useState(20);
      const [wealthContribution, setWealthContribution] = useState(0);
      const [wealthPaths, setWealthPaths] = useState(2000);
      const [wealthReturnSource, setWealthReturnSource] = useState('btg');

      useEffect(() => { runSelfTests(); }, []);

      const cmaReturns = useMemo(() => {
        const r = { ...otherReturns };
        Object.keys(fiDecomposition).forEach(k => {
          const c = fiDecomposition[k];
          r[k] = c.rf + c.spread + c.roll + c.val_rf + c.val_spr + c.def;
        });
        Object.keys(eqDecomposition).forEach(k => {
          const c = eqDecomposition[k];
          r[k] = c.div + c.earnings + c.inflation + c.val + c.fx;
        });
        return r;
      }, [fiDecomposition, eqDecomposition, otherReturns]);

      const correlationMatrix = useMemo(() => {
        const mat = INITIAL_CORR_MATRIX.map(row => [...row]);
        Object.keys(correlationOverrides).forEach(key => {
          const [i, j] = key.split('-').map(Number);
          mat[i][j] = correlationOverrides[key];
          mat[j][i] = correlationOverrides[key];
        });
        return mat;
      }, [correlationOverrides]);

      const calcVol = useCallback(weights => {
        let varSum = 0;
        for (let i = 0; i < ASSETS.length; i++) {
          for (let j = 0; j < ASSETS.length; j++) {
            const cov = correlationMatrix[i][j] * HISTORICAL_METRICS[ASSETS[i]].vol * HISTORICAL_METRICS[ASSETS[j]].vol;
            varSum += (weights[i] / 100) * (weights[j] / 100) * cov;
          }
        }
        return Math.sqrt(Math.max(0, varSum));
      }, [correlationMatrix]);

      const calcReturn = useCallback((weights, returns = null) => {
        const retMap = returns || cmaReturns;
        return weights.reduce((sum, w, i) => sum + (w / 100) * retMap[ASSETS[i]], 0);
      }, [cmaReturns]);

      const getProfileWeights = useCallback(pName => {
        if (pName === 'Dynamic') return dynWeights;
        if (pName === 'Custom') return customWeights;
        return BASE_PROFILES[pName];
      }, [dynWeights, customWeights]);

      const getDynamicPath = useCallback(() => {
        const cashW = Array(9).fill(0);
        cashW[ASSETS.indexOf('cash')] = 100;

        let maxRetW = [...BASE_PROFILES.Equities];
        let maxRet = calcReturn(maxRetW);
        ASSETS.forEach((_, i) => {
          const testW = Array(9).fill(0);
          testW[i] = 100;
          const r = calcReturn(testW);
          if (r > maxRet) {
            maxRet = r;
            maxRetW = testW;
          }
        });

        const rawPath = [
          { name: 'Cash', weights: cashW },
          { name: 'Fixed Income', weights: BASE_PROFILES['Fixed Income'] },
          { name: 'Conservative', weights: BASE_PROFILES.Conservative },
          { name: 'Balanced', weights: BASE_PROFILES.Balanced },
          { name: 'Growth', weights: BASE_PROFILES.Growth },
          { name: 'Equities', weights: BASE_PROFILES.Equities },
          { name: 'Max Return', weights: maxRetW }
        ].map(p => ({ ...p, ret: calcReturn(p.weights), vol: calcVol(p.weights) }));

        return rawPath
          .sort((a, b) => a.ret - b.ret)
          .filter((p, idx, arr) => idx === 0 || p.ret > arr[idx - 1].ret + 0.01)
          .map((p, idx, arr) => ({
            ...p,
            vol: idx === 0 ? p.vol : Math.max(p.vol, arr[idx - 1].vol + 0.01)
          }));
      }, [calcReturn, calcVol]);

      const interpolateWeightsOnPath = useCallback((target, key = 'ret') => {
        const path = getDynamicPath().sort((a, b) => a[key] - b[key]);
        if (target <= path[0][key]) return [...path[0].weights];
        if (target >= path[path.length - 1][key]) return [...path[path.length - 1].weights];

        for (let i = 0; i < path.length - 1; i++) {
          const lo = path[i];
          const hi = path[i + 1];
          if (target >= lo[key] && target <= hi[key]) {
            const denom = hi[key] - lo[key] || 1;
            const t = (target - lo[key]) / denom;
            return lo.weights.map((w, idx) => w + t * (hi.weights[idx] - w));
          }
        }
        return [...BASE_PROFILES[dynBaseProfile]];
      }, [getDynamicPath, dynBaseProfile]);

      const syncDynamicFromReturn = useCallback(value => {
        const path = getDynamicPath();
        const minRet = path[0].ret;
        const maxRet = path[path.length - 1].ret;
        const target = clamp(Number(value), minRet, maxRet);
        const weights = interpolateWeightsOnPath(target, 'ret');
        setDynTargetRet(Number(calcReturn(weights).toFixed(2)));
        setDynTargetVol(Number(calcVol(weights).toFixed(2)));
        setDynWeights(weights.map(v => Number(v.toFixed(2))));
        setLastActiveConstraint('ret');
        setSimProfile('Dynamic');
      }, [getDynamicPath, interpolateWeightsOnPath, calcReturn, calcVol]);

      const syncDynamicFromVol = useCallback(value => {
        const path = getDynamicPath().sort((a, b) => a.vol - b.vol);
        const minVol = path[0].vol;
        const maxVol = path[path.length - 1].vol;
        const target = clamp(Number(value), minVol, maxVol);
        const weights = interpolateWeightsOnPath(target, 'vol');
        setDynTargetRet(Number(calcReturn(weights).toFixed(2)));
        setDynTargetVol(Number(calcVol(weights).toFixed(2)));
        setDynWeights(weights.map(v => Number(v.toFixed(2))));
        setLastActiveConstraint('vol');
        setSimProfile('Dynamic');
      }, [getDynamicPath, interpolateWeightsOnPath, calcReturn, calcVol]);

      const applyDynamicBaseProfile = useCallback(profileName => {
        const weights = [...BASE_PROFILES[profileName]];
        setDynBaseProfile(profileName);
        setDynTargetRet(Number(calcReturn(weights).toFixed(2)));
        setDynTargetVol(Number(calcVol(weights).toFixed(2)));
        setDynWeights(weights.map(v => Number(v.toFixed(2))));
        setLastActiveConstraint('ret');
        setSimProfile('Dynamic');
      }, [calcReturn, calcVol]);

      useEffect(() => {
        if (lastActiveConstraint === 'vol') {
          const weights = interpolateWeightsOnPath(dynTargetVol, 'vol');
          setDynWeights(weights.map(v => Number(v.toFixed(2))));
        } else {
          const weights = interpolateWeightsOnPath(dynTargetRet, 'ret');
          setDynWeights(weights.map(v => Number(v.toFixed(2))));
        }
      }, [dynTargetRet, dynTargetVol, interpolateWeightsOnPath, lastActiveConstraint]);


      const syntheticHistory = useMemo(() => EMBEDDED_HISTORICAL_PROXY_RETURNS, []);

      const simData = useMemo(() => {
        const w = getProfileWeights(simProfile);
        const nPaths = Number(simPaths) || 1000;
        const T = 120;
        const blockSize = 6;
        const nBlocks = Math.ceil(T / blockSize);
        const paths = [];
        const simSeed = hashString(`simulation|${simProfile}|${simCapital}|${simPaths}|${weightsSignature(w)}|${matrixSignature(correlationMatrix)}`);
        const rng = createRng(simSeed);

        for (let p = 0; p < nPaths; p++) {
          let capital = simCapital;
          const path = [capital];
          let currentMonth = 0;
          for (let b = 0; b < nBlocks; b++) {
            const startIndex = Math.floor(rng() * (syntheticHistory.length - blockSize + 1));
            for (let i = 0; i < blockSize && currentMonth < T; i++) {
              const monthData = syntheticHistory[startIndex + i];
              let portRet = 0;
              ASSETS.forEach((a, idx) => portRet += (w[idx] / 100) * monthData[a]);
              capital *= (1 + portRet);
              path.push(capital);
              currentMonth++;
            }
          }
          paths.push(path);
        }

        return Array.from({ length: T + 1 }, (_, t) => {
          const vals = paths.map(p => p[t]).sort((a, b) => a - b);
          return {
            month: t,
            year: Number((t / 12).toFixed(2)),
            p5: vals[Math.floor(nPaths * 0.05)],
            p50: vals[Math.floor(nPaths * 0.50)],
            p95: vals[Math.floor(nPaths * 0.95)]
          };
        });
      }, [simProfile, simCapital, simPaths, getProfileWeights, syntheticHistory, correlationMatrix]);

      const portfolioHistoricalReturns = useMemo(() => {
        const w = getProfileWeights(simProfile);
        return syntheticHistory.map(m => {
          let r = 0;
          ASSETS.forEach((a, i) => r += (w[i] / 100) * m[a]);
          return { date: m.date, yearFrac: m.yearFrac, ret: r };
        });
      }, [simProfile, getProfileWeights, syntheticHistory]);

      const backtestData = useMemo(() => {
        let cap = 100;
        const path = [];
        portfolioHistoricalReturns.forEach((m, idx) => {
          cap *= (1 + m.ret);
          path.push({ date: m.date, yearFrac: m.yearFrac, value: cap });
        });
        return path;
      }, [portfolioHistoricalReturns]);

      const drawdownData = useMemo(() => {
        let cap = 100, peak = 100;
        return portfolioHistoricalReturns.map(m => {
          cap *= (1 + m.ret);
          if (cap > peak) peak = cap;
          return { date: m.date, yearFrac: m.yearFrac, drawdown: ((cap - peak) / peak) * 100 };
        });
      }, [portfolioHistoricalReturns]);

      const backtestSummary = useMemo(() => {
        const n = portfolioHistoricalReturns.length;
        const cumulative = portfolioHistoricalReturns.reduce((acc, m) => acc * (1 + m.ret), 1);
        const annReturn = n > 0 ? Math.pow(cumulative, 12 / n) - 1 : 0;
        const avg = n > 0 ? portfolioHistoricalReturns.reduce((s, m) => s + m.ret, 0) / n : 0;
        const variance = n > 1 ? portfolioHistoricalReturns.reduce((s, m) => s + Math.pow(m.ret - avg, 2), 0) / (n - 1) : 0;
        const annVol = Math.sqrt(variance) * Math.sqrt(12);
        const maxDrawdown = drawdownData.length ? Math.min(...drawdownData.map(d => d.drawdown)) : 0;
        return {
          start: portfolioHistoricalReturns[0]?.date || 'N/A',
          end: portfolioHistoricalReturns[n - 1]?.date || 'N/A',
          annualizedReturn: annReturn * 100,
          annualizedVol: annVol * 100,
          maxDrawdown
        };
      }, [portfolioHistoricalReturns, drawdownData]);


      const wealthExpectedReturns = useMemo(() => {
        if (wealthReturnSource === 'btg') return cmaReturns;
        return Object.fromEntries(ASSETS.map(a => [a, HISTORICAL_METRICS[a].ret]));
      }, [wealthReturnSource, cmaReturns]);

      const wealthSimData = useMemo(() => {
        const w = getProfileWeights(simProfile);
        const years = Number(wealthYears) || 20;
        const T = years * 12;
        const nPaths = Number(wealthPaths) || 2000;
        const monthlyContribution = (Number(wealthContribution) || 0) / 12;
        const expectedPortRet = calcReturn(w, wealthExpectedReturns) / 100;
        const rng = createRng(hashString(`wealth|${simProfile}|${wealthCapital}|${wealthYears}|${wealthContribution}|${wealthPaths}|${wealthReturnSource}|${weightsSignature(w)}`));
        const paths = [];
        for (let p = 0; p < nPaths; p++) {
          let capital = Number(wealthCapital) || 0;
          const path = [capital];
          for (let t = 0; t < T; t++) {
            const sampled = syntheticHistory[Math.floor(rng() * syntheticHistory.length)];
            let sampledRet = 0;
            ASSETS.forEach((a, i) => sampledRet += (w[i] / 100) * sampled[a]);
            capital = capital * (1 + sampledRet) + monthlyContribution;
            path.push(capital);
          }
          paths.push(path);
        }
        let det = Number(wealthCapital) || 0;
        const detSeries = [det];
        for (let t = 0; t < T; t++) {
          det = det * (1 + expectedPortRet / 12) + monthlyContribution;
          detSeries.push(det);
        }
        return Array.from({ length: years + 1 }, (_, y) => {
          const idx = y * 12;
          const vals = paths.map(p => p[idx]).sort((a, b) => a - b);
          return {
            year: y,
            p5: vals[Math.floor(nPaths * 0.05)],
            p25: vals[Math.floor(nPaths * 0.25)],
            p50: vals[Math.floor(nPaths * 0.50)],
            p75: vals[Math.floor(nPaths * 0.75)],
            p95: vals[Math.floor(nPaths * 0.95)],
            det: detSeries[idx]
          };
        });
      }, [simProfile, getProfileWeights, wealthCapital, wealthYears, wealthContribution, wealthPaths, wealthReturnSource, wealthExpectedReturns, calcReturn, syntheticHistory]);

      const wealthSummary = useMemo(() => {
        const w = getProfileWeights(simProfile);
        const last = wealthSimData[wealthSimData.length - 1] || { p5: 0, p50: 0, p95: 0 };
        return {
          expectedReturn: calcReturn(w, wealthExpectedReturns),
          portfolioVol: calcVol(w),
          medianWealth: last.p50,
          lowerWealth: last.p5,
          upperWealth: last.p95
        };
      }, [wealthSimData, simProfile, getProfileWeights, calcReturn, calcVol, wealthExpectedReturns]);

      const allProfiles = useMemo(() => [...Object.keys(BASE_PROFILES), 'Dynamic', 'Custom'], []);
      const allocationRows = useMemo(() => allProfiles.map(profile => {
        const w = getProfileWeights(profile);
        const row = { Profile: profile, 'Expected Return (%)': calcReturn(w), 'Volatility (%)': calcVol(w), 'Total Weight (%)': w.reduce((a,b)=>a+b,0) };
        ASSETS.forEach((a, i) => row[`${ASSET_LABELS[a]} Weight (%)`] = w[i]);
        return row;
      }), [allProfiles, getProfileWeights, calcReturn, calcVol]);

      const cmaRows = useMemo(() => ASSETS.map(a => ({
        Asset: ASSET_LABELS[a],
        'Expected Return (%)': cmaReturns[a],
        'Historical Return (%)': HISTORICAL_METRICS[a].ret,
        'Historical Volatility (%)': HISTORICAL_METRICS[a].vol
      })), [cmaReturns]);

      const stressRows = useMemo(() => {
        const rows = [];
        allProfiles.forEach(profile => {
          const w = getProfileWeights(profile);
          STRESS_SCENARIOS.forEach(s => {
            const row = { Profile: profile, Scenario: s.title, Period: s.subtitle };
            let total = 0;
            ASSETS.forEach((a, i) => {
              const contrib = (w[i] / 100) * s.rets[i];
              total += contrib;
              row[`${ASSET_LABELS[a]} Return (%)`] = s.rets[i];
              row[`${ASSET_LABELS[a]} Contribution (%)`] = contrib;
            });
            row['Portfolio Return (%)'] = total;
            rows.push(row);
          });
        });
        return rows;
      }, [allProfiles, getProfileWeights]);

      const correlationRows = useMemo(() => ASSETS.map((a, i) => {
        const row = { Asset: ASSET_LABELS[a] };
        ASSETS.forEach((b, j) => row[ASSET_LABELS[b]] = correlationMatrix[i][j]);
        return row;
      }), [correlationMatrix]);

      const handleCashChange = val => {
        const num = parseFloat(val) || 0;
        const delta = num - otherReturns.cash;
        setOtherReturns(p => ({ ...p, cash: num }));
        const newFi = { ...fiDecomposition };
        Object.keys(newFi).forEach(k => newFi[k] = { ...newFi[k], rf: Number((newFi[k].rf + delta).toFixed(2)) });
        setFiDecomposition(newFi);
      };
      const handleDecompChange = (type, asset, field, val) => {
        const num = parseFloat(val) || 0;
        if (type === 'fi') setFiDecomposition(p => ({ ...p, [asset]: { ...p[asset], [field]: num } }));
        else setEqDecomposition(p => ({ ...p, [asset]: { ...p[asset], [field]: num } }));
      };
      const handleCorrChange = (i, j, val) => {
        const num = parseFloat(val);
        if (isNaN(num) || num < -1 || num > 1) return;
        setCorrelationOverrides(p => ({ ...p, [`${i}-${j}`]: num }));
      };
      const normalizeCustomWeights = () => {
        const total = customWeights.reduce((a, b) => a + b, 0);
        if (total <= 0) return;
        const normalized = customWeights.map(w => Number(((w / total) * 100).toFixed(2)));
        const drift = 100 - normalized.reduce((a,b)=>a+b,0);
        normalized[normalized.length - 1] = Number((normalized[normalized.length - 1] + drift).toFixed(2));
        setCustomWeights(normalized);
      };
      const resetAll = () => {
        setFiDecomposition(JSON.parse(JSON.stringify(INITIAL_FI_DECOMPOSITION)));
        setEqDecomposition(JSON.parse(JSON.stringify(INITIAL_EQ_DECOMPOSITION)));
        setOtherReturns({ ...BASE_RETURNS_OTHER });
        setCorrelationOverrides({});
        setDynBaseProfile('Balanced');
        setDynTargetRet(Number(DEFAULT_DYNAMIC_RET.toFixed(2)));
        setDynTargetVol(Number(DEFAULT_DYNAMIC_VOL.toFixed(2)));
        setDynWeights(BASE_PROFILES.Balanced.map(v => Number(v.toFixed(2))));
        setCustomWeights([...DEFAULT_CUSTOM_WEIGHTS]);
        setLastActiveConstraint('ret');
        setSimProfile('Balanced');
        setSimCapital(1000000);
        setSimPaths(1000);
        setWealthCapital(1000000);
        setWealthYears(20);
        setWealthContribution(0);
        setWealthPaths(2000);
        setWealthReturnSource('btg');
      };

      const handleExportPDF = () => {
        if (!window.html2pdf) {
          alert('PDF export library is not available in this environment.');
          return;
        }
        setIsExportingPDF(true);
        const element = document.getElementById('export-container');
        element.classList.add('pdf-printing');
        const opt = {
          margin: 0.2,
          filename: `BTG_Portfolio_Allocation_${activeTab}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, logging: false },
          jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' }
        };
        setTimeout(() => {
          window.html2pdf().set(opt).from(element).save().finally(() => {
            element.classList.remove('pdf-printing');
            setIsExportingPDF(false);
          });
        }, 100);
      };

      const handleExportExcel = () => {
        setIsExportingExcel(true);
        try {
          if (!window.XLSX) throw new Error('XLSX library unavailable');
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allocationRows), 'Allocation Matrix');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cmaRows), 'CMA Summary');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(correlationRows), 'Correlations');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stressRows), 'Stress Tests');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(simData), 'Simulation Percentiles');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(backtestData), 'Backtest');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(drawdownData), 'Drawdown');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([backtestSummary]), 'Backtest Summary');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(syntheticHistory), 'Embedded Monthly Returns');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wealthSimData), 'Wealth Simulator');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([wealthSummary]), 'Wealth Summary');
          const metadata = [{
            'Selected Simulation Profile': simProfile,
            'Initial Capital': simCapital,
            'Simulation Paths': simPaths,
            'Dynamic Base Profile': dynBaseProfile,
            'Dynamic Target Return (%)': dynTargetRet,
            'Dynamic Target Volatility (%)': dynTargetVol,
            'Export Timestamp': new Date().toISOString(),
            'Methodology Note': 'Illustrative browser-side allocation engine. Stress scenarios and simulations are for analytical training and internal discussion, not an investment recommendation.'
          }];
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(metadata), 'Metadata');
          XLSX.writeFile(wb, `BTG_Portfolio_Allocation_Lab_${new Date().toISOString().slice(0,10)}.xlsx`);
        } catch (e) {
          alert('Excel export failed. The XLSX export library is not available in this environment.');
          console.error(e);
        } finally {

      };

      const renderAssumptions = () => (
        <div className="space-y-6">
          <Card>
            <h3 className="text-lg font-bold btg-text-primary mb-1">Capital Market Assumptions</h3>
            <p className="text-sm text-slate-500 mb-4">Editable return assumptions propagate to the allocation engine and Excel export.</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              {[ASSETS.slice(0, 5), ASSETS.slice(5)].map((group, idx) => (
                <table key={idx} className="w-full text-sm">
                  <thead><tr className="border-b border-slate-200 text-slate-600"><th className="text-left py-2">Asset Class</th><th className="text-right py-2">Exp. Return</th><th className="text-right py-2">Hist. Vol</th></tr></thead>
                  <tbody>{group.map(a => {
                    const isEditable = a === 'cash' || a === 'alts';
                    return <tr key={a} className="border-b border-slate-100 last:border-0 hover:bg-slate-50"><td className="py-3 font-medium flex items-center"><span className="w-2 h-2 rounded-full mr-2" style={{ backgroundColor: COLORS[a] }}></span>{ASSET_LABELS[a]}</td><td className="py-3 text-right">{isEditable ? <input type="number" step="0.1" className="w-16 text-right bg-blue-50 border border-blue-200 rounded p-1 font-bold text-blue-700 outline-none" value={otherReturns[a]} onChange={e => a === 'cash' ? handleCashChange(e.target.value) : setOtherReturns(p => ({ ...p, [a]: parseFloat(e.target.value) || 0 }))}/> : <span className="font-bold text-slate-700">{fmtPct(cmaReturns[a])}</span>}</td><td className="py-3 text-right text-slate-500">{fmtPct(HISTORICAL_METRICS[a].vol)}</td></tr>;
                  })}</tbody>
                </table>
              ))}
            </div>
          </Card>

          <Card>
            <h3 className="text-lg font-bold btg-text-primary mb-4">Return Attribution Building Blocks</h3>
            <div className="space-y-8">
              <div>
                <h4 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2">Fixed Income</h4>
                <div className="overflow-x-auto"><table className="w-full text-xs"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-2 text-left">Asset</th><th className="p-2 text-right">Risk Free</th><th className="p-2 text-right">Spread</th><th className="p-2 text-right">Roll</th><th className="p-2 text-right">Val(RF)</th><th className="p-2 text-right">Val(Spr)</th><th className="p-2 text-right">Default</th><th className="p-2 text-right font-bold">Total</th></tr></thead><tbody>{Object.keys(fiDecomposition).map(key => { const d = fiDecomposition[key]; const total = d.rf + d.spread + d.roll + d.val_rf + d.val_spr + d.def; return <tr key={key} className="border-b border-slate-100 hover:bg-slate-50"><td className="p-2 font-medium text-slate-700">{ASSET_LABELS[key]}</td><td className="p-2 text-right">{key === 'dev_sov' ? <input type="number" step="0.1" className="w-12 text-right bg-transparent border-b border-slate-300 outline-none" value={d.rf} onChange={e => handleCashChange(e.target.value)}/> : <span className="text-slate-500">{d.rf.toFixed(2)}</span>}</td>{['spread','roll','val_rf','val_spr','def'].map(field => <td key={field} className="p-2 text-right"><input type="number" step="0.05" className="w-12 text-right bg-transparent border-b border-slate-200 outline-none" value={d[field]} onChange={e => handleDecompChange('fi', key, field, e.target.value)}/></td>)}<td className="p-2 text-right font-bold bg-slate-50">{fmtPct(total)}</td></tr>; })}</tbody></table></div>
              </div>
              <div>
                <h4 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2">Equities</h4>
                <div className="overflow-x-auto"><table className="w-full text-xs"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-2 text-left">Asset</th><th className="p-2 text-right">Div. Yield</th><th className="p-2 text-right">Real Earnings</th><th className="p-2 text-right">Inflation</th><th className="p-2 text-right">Valuation</th><th className="p-2 text-right">FX</th><th className="p-2 text-right font-bold">Total</th></tr></thead><tbody>{Object.keys(eqDecomposition).map(key => { const d = eqDecomposition[key]; const total = d.div + d.earnings + d.inflation + d.val + d.fx; return <tr key={key} className="border-b border-slate-100 hover:bg-slate-50"><td className="p-2 font-medium text-slate-700">{ASSET_LABELS[key]}</td>{['div','earnings','inflation','val','fx'].map(field => <td key={field} className="p-2 text-right"><input type="number" step="0.05" className="w-12 text-right bg-transparent border-b border-slate-200 outline-none" value={d[field]} onChange={e => handleDecompChange('eq', key, field, e.target.value)}/></td>)}<td className="p-2 text-right font-bold bg-slate-50">{fmtPct(total)}</td></tr>; })}</tbody></table></div>
              </div>
            </div>
          </Card>

          <Card className="overflow-x-auto">
            <h3 className="text-lg font-bold btg-text-primary mb-1">Correlation Matrix</h3>
            <p className="text-sm text-slate-500 mb-4">Editable matrix used in portfolio volatility and simulation. Values must remain between -1 and 1.</p>
            <table className="w-full text-xs border-collapse min-w-[900px]">
              <thead><tr><th className="p-2 border bg-slate-50"></th>{ASSETS.map(k => <th key={k} className="p-2 border bg-slate-50 text-slate-600 font-normal">{k.toUpperCase().substring(0,4)}</th>)}</tr></thead>
              <tbody>{ASSETS.map((rowKey, i) => <tr key={rowKey}><td className="p-2 border font-bold bg-slate-50 text-slate-600">{rowKey.toUpperCase().substring(0,4)}</td>{ASSETS.map((colKey, j) => <td key={colKey} className={`p-2 border text-center ${i === j ? 'bg-slate-100 text-slate-300' : ''}`}>{i === j ? '1.0' : <input type="number" step="0.05" max="1" min="-1" className="w-full text-center bg-transparent outline-none focus:text-blue-700 focus:font-bold" value={correlationMatrix[i][j]} onChange={e => handleCorrChange(i, j, e.target.value)}/>}</td>)}</tr>)}</tbody>
            </table>
          </Card>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col overflow-x-hidden">
          <header className="btg-bg-primary text-white flex items-center justify-between px-6 py-4 shadow-md z-20 shrink-0">
            <div className="flex items-center gap-4 min-w-0">
              <div className="font-extrabold text-xl tracking-tight border-r border-white/25 pr-4 whitespace-nowrap">BTG Pactual</div>
              <div className="hidden md:block"><h1 className="text-base font-bold tracking-tight">Portfolio Allocation Lab</h1><p className="text-xs text-slate-300">Allocation matrix, assumptions, stress testing, simulation, PDF and Excel export</p></div>
            </div>
            <div className="flex items-center gap-2 no-print">
              <button onClick={handleExportExcel} disabled={isExportingExcel} className="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors text-sm font-semibold disabled:opacity-50">
                <Icon path={I_FileSpreadsheet} size={16}/><span>{isExportingExcel ? 'Exporting...' : 'Download Excel'}</span>
              </button>
              <button onClick={handleExportPDF} disabled={isExportingPDF} className="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2 rounded-lg transition-colors text-sm font-semibold disabled:opacity-50">
                <Icon path={I_Download} size={16}/><span>{isExportingPDF ? 'Generating...' : 'Export PDF'}</span>
              </button>
            </div>
          </header>

          <div className="bg-white border-b border-slate-200 px-6 flex gap-6 text-sm font-medium shrink-0 shadow-sm z-10 overflow-x-auto no-scrollbar no-print">
            <TabButton active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={I_Layout}>Allocation Matrix & Simulations</TabButton>
            <TabButton active={activeTab === 'wealth'} onClick={() => setActiveTab('wealth')} icon={I_Layout}>Risk Profile Wealth Simulator</TabButton>
            <TabButton active={activeTab === 'assumptions'} onClick={() => setActiveTab('assumptions')} icon={I_Settings}>Assumptions & Correlations</TabButton>
          </div>

          <main id="export-container" className="flex-1 p-6 max-w-screen-2xl mx-auto w-full transition-all">
            {activeTab === 'dashboard' && renderDashboard()}
            {activeTab === 'wealth' && renderWealthSimulator()}
            {activeTab === 'assumptions' && renderAssumptions()}
            <div className="mt-6 text-xs text-slate-500 border-t border-slate-200 pt-4">
              Methodology note: this is an illustrative browser-side allocation tool. Outputs depend on user-edited assumptions, simplified stress scenarios, simulated paths, and static asset-class inputs. Use for internal analysis and discussion, not as an investment recommendation.
            </div>
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
