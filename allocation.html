    const gaussianRandom = () => {
      let u = 0, v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    };
    const cholesky = matrix => {
      const n = matrix.length;
      const res = Array(n).fill(0).map(() => Array(n).fill(0));
      try {
        for (let i = 0; i < n; i++) {
          for (let k = 0; k <= i; k++) {
            let sum = 0;
            for (let j = 0; j < k; j++) sum += res[i][j] * res[k][j];
            if (i === k) {
              const val = matrix[i][i] - sum;
              if (val <= 0) throw new Error('Matrix not positive definite');
              res[i][k] = Math.sqrt(val);
            } else {
              res[i][k] = (matrix[i][k] - sum) / res[k][k];
            }
          }
        }
        return res;
      } catch (e) {
        return Array(n).fill(0).map((_, i) => Array(n).fill(0).map((_, j) => i === j ? 1 : 0));
      }
    };

    const SimpleLineChart = ({ data, xKey, lines, height = 300, yFormatter = v => v.toFixed(1), xFormatter = v => v, areaBand = null }) => {
      const width = 900;

      const plotH = height - pad.top - pad.bottom;
      const values = [];

      if (areaBand) {
        data.forEach(d => { values.push(Number(d[areaBand.high])); values.push(Number(d[areaBand.low])); });
      }
      const yMinRaw = Math.min(...values);
      const yMaxRaw = Math.max(...values);
      const range = yMaxRaw - yMinRaw || 1;
      const yMin = yMinRaw - range * 0.08;
      const yMax = yMaxRaw + range * 0.08;
      const xVals = data.map(d => Number(d[xKey]));
      const xMin = Math.min(...xVals);
      const xMax = Math.max(...xVals);
      const sx = v => pad.left + ((Number(v) - xMin) / ((xMax - xMin) || 1)) * plotW;
      const sy = v => pad.top + (1 - ((Number(v) - yMin) / ((yMax - yMin) || 1))) * plotH;
      const pathFor = key => data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${sx(d[xKey])} ${sy(d[key])}`).join(' ');

      console.assert(typeof window.Recharts === 'undefined' || typeof window.Recharts === 'object', 'Recharts is optional and no longer required');
      console.assert(typeof XLSX === 'object', 'XLSX library should be loaded for Excel export');

      const [dynBaseProfile, setDynBaseProfile] = useState('Balanced');
      const [dynTargetRet, setDynTargetRet] = useState(0);
      const [dynTargetVol, setDynTargetVol] = useState(0);
      const [lastActiveConstraint, setLastActiveConstraint] = useState('ret');
      const [dynWeights, setDynWeights] = useState(BASE_PROFILES.Balanced);

      const [simCapital, setSimCapital] = useState(1000000);
      const [simPaths, setSimPaths] = useState(1000);

      useEffect(() => { runSelfTests(); }, []);

      const cmaReturns = useMemo(() => {
        const r = { ...otherReturns };
        Object.keys(fiDecomposition).forEach(k => {
          const c = fiDecomposition[k];
          r[k] = c.rf + c.spread + c.roll + c.val_rf + c.val_spr + c.def;
        });
        Object.keys(eqDecomposition).forEach(k => {
          const c = eqDecomposition[k];
          r[k] = c.div + c.earnings + c.inflation + c.val + c.fx;
        });
        return r;
      }, [fiDecomposition, eqDecomposition, otherReturns]);

      const correlationMatrix = useMemo(() => {
        const mat = INITIAL_CORR_MATRIX.map(row => [...row]);
        Object.keys(correlationOverrides).forEach(key => {
          const [i, j] = key.split('-').map(Number);
          mat[i][j] = correlationOverrides[key];
          mat[j][i] = correlationOverrides[key];
        });
        return mat;
      }, [correlationOverrides]);

      const calcVol = useCallback(weights => {
        let varSum = 0;
        for (let i = 0; i < ASSETS.length; i++) {
          for (let j = 0; j < ASSETS.length; j++) {
            const cov = correlationMatrix[i][j] * HISTORICAL_METRICS[ASSETS[i]].vol * HISTORICAL_METRICS[ASSETS[j]].vol;
            varSum += (weights[i] / 100) * (weights[j] / 100) * cov;
          }
        }
        return Math.sqrt(Math.max(0, varSum));
      }, [correlationMatrix]);

      const calcReturn = useCallback((weights, returns = null) => {
        const retMap = returns || cmaReturns;
        return weights.reduce((sum, w, i) => sum + (w / 100) * retMap[ASSETS[i]], 0);
      }, [cmaReturns]);

      const getProfileWeights = useCallback(pName => {
        if (pName === 'Dynamic') return dynWeights;
        if (pName === 'Custom') return customWeights;
        return BASE_PROFILES[pName];
      }, [dynWeights, customWeights]);

      useEffect(() => {
        if (dynTargetRet === 0) {
          setDynTargetRet(calcReturn(BASE_PROFILES.Balanced));
          setDynTargetVol(calcVol(BASE_PROFILES.Balanced));
        }
      }, [calcReturn, calcVol, dynTargetRet]);

      useEffect(() => {
        const baseW = BASE_PROFILES[dynBaseProfile];
        const eqW = BASE_PROFILES.Equities;
        const fiW = BASE_PROFILES['Fixed Income'];
        let maxRetW = Array(9).fill(0), minVolW = Array(9).fill(0);
        let bestSingleRet = -Infinity, bestSingleVol = Infinity;

        ASSETS.forEach((_, i) => {
          const testW = Array(9).fill(0);
          testW[i] = 100;
          const r = calcReturn(testW);
          const v = calcVol(testW);
          if (r > bestSingleRet) { bestSingleRet = r; maxRetW = testW; }
          if (v < bestSingleVol) { bestSingleVol = v; minVolW = testW; }
        });

        let riskOnW = eqW;
        let riskOffW = fiW;
        if (lastActiveConstraint === 'ret') {
          if (dynTargetRet > calcReturn(eqW)) riskOnW = maxRetW;
          if (dynTargetRet < calcReturn(fiW)) riskOffW = minVolW;
        } else {
          if (dynTargetVol > calcVol(eqW)) riskOnW = maxRetW;
          if (dynTargetVol < calcVol(fiW)) riskOffW = minVolW;
        }

        let bestW = [...baseW];
        let minPenalty = Infinity;
        const retWeight = lastActiveConstraint === 'ret' ? 500 : 1;
        const volWeight = lastActiveConstraint === 'vol' ? 500 : 1;

        for (let alpha = -1; alpha <= 2; alpha += 0.05) {
          for (let beta = -1; beta <= 2; beta += 0.05) {
            const gamma = 1 - alpha - beta;
            let w = baseW.map((_, i) => alpha * riskOnW[i] + beta * riskOffW[i] + gamma * baseW[i]);
            w = w.map(v => Math.max(0, v));
            const sum = w.reduce((a, b) => a + b, 0);
            if (sum === 0) continue;
            w = w.map(v => (v / sum) * 100);
            const ret = calcReturn(w);
            const vol = calcVol(w);
            const penalty = Math.pow(ret - dynTargetRet, 2) * retWeight + Math.pow(vol - dynTargetVol, 2) * volWeight;
            if (penalty < minPenalty) {
              minPenalty = penalty;
              bestW = w;
            }
          }
        }
        setDynWeights(bestW.map(v => Number(v.toFixed(2))));
      }, [dynTargetRet, dynTargetVol, dynBaseProfile, calcReturn, calcVol, lastActiveConstraint]);

      const syntheticHistory = useMemo(() => {
        const T = 120;
        const data = [];
        const L = cholesky(correlationMatrix);
        for (let t = 0; t < T; t++) {
          const z = ASSETS.map(() => gaussianRandom());
          const correlatedZ = multiplyMatrixVector(L, z);
          const monthRets = {};
          ASSETS.forEach((a, i) => {
            const annMean = HISTORICAL_METRICS[a].ret / 100;
            const annVol = HISTORICAL_METRICS[a].vol / 100;
            const drift = (annMean - 0.5 * annVol * annVol) / 12;
            const vol = annVol / Math.sqrt(12);
            monthRets[a] = drift + vol * correlatedZ[i];
          });
          data.push(monthRets);
        }
        return data;
      }, [correlationMatrix]);

      const simData = useMemo(() => {
        const w = getProfileWeights(simProfile);
        const nPaths = Number(simPaths) || 1000;
        const T = 120;
        const blockSize = 6;
        const nBlocks = Math.ceil(T / blockSize);
        const paths = [];

        for (let p = 0; p < nPaths; p++) {
          let capital = simCapital;
          const path = [capital];
          let currentMonth = 0;
          for (let b = 0; b < nBlocks; b++) {
            const startIndex = Math.floor(Math.random() * (syntheticHistory.length - blockSize));
            for (let i = 0; i < blockSize && currentMonth < T; i++) {
              const monthData = syntheticHistory[startIndex + i];
              let portRet = 0;
              ASSETS.forEach((a, idx) => portRet += (w[idx] / 100) * monthData[a]);
              capital *= (1 + portRet);
              path.push(capital);
              currentMonth++;
            }
          }
          paths.push(path);
        }

        return Array.from({ length: T + 1 }, (_, t) => {
          const vals = paths.map(p => p[t]).sort((a, b) => a - b);
          return {
            month: t,
            year: Number((t / 12).toFixed(2)),
            p5: vals[Math.floor(nPaths * 0.05)],
            p50: vals[Math.floor(nPaths * 0.50)],
            p95: vals[Math.floor(nPaths * 0.95)]
          };
        });
      }, [simProfile, simCapital, simPaths, getProfileWeights, syntheticHistory]);

      const backtestData = useMemo(() => {
        const w = getProfileWeights(simProfile);
        let cap = 100;
        const path = [];
        syntheticHistory.forEach((m, idx) => {
          let r = 0;
          ASSETS.forEach((a, i) => r += (w[i] / 100) * m[a]);
          cap *= (1 + r);
          if (idx % 12 === 0 || idx === syntheticHistory.length - 1) {
            path.push({ year: 2016 + Math.floor(idx / 12), value: cap });
          }
        });
        return path;
      }, [simProfile, getProfileWeights, syntheticHistory]);

      const drawdownData = useMemo(() => {
        const w = getProfileWeights(simProfile);
        let cap = 100, peak = 100;
        return syntheticHistory.map((m, idx) => {
          let r = 0;
          ASSETS.forEach((a, i) => r += (w[i] / 100) * m[a]);
          cap *= (1 + r);
          if (cap > peak) peak = cap;
          return { month: idx, year: 2016 + Math.floor(idx / 12), drawdown: ((cap - peak) / peak) * 100 };
        });
      }, [simProfile, getProfileWeights, syntheticHistory]);

      const allProfiles = useMemo(() => [...Object.keys(BASE_PROFILES), 'Dynamic', 'Custom'], []);
      const allocationRows = useMemo(() => allProfiles.map(profile => {
        const w = getProfileWeights(profile);
        const row = { Profile: profile, 'Expected Return (%)': calcReturn(w), 'Volatility (%)': calcVol(w), 'Total Weight (%)': w.reduce((a,b)=>a+b,0) };
        ASSETS.forEach((a, i) => row[`${ASSET_LABELS[a]} Weight (%)`] = w[i]);
        return row;
      }), [allProfiles, getProfileWeights, calcReturn, calcVol]);

      const cmaRows = useMemo(() => ASSETS.map(a => ({
        Asset: ASSET_LABELS[a],
        'Expected Return (%)': cmaReturns[a],
        'Historical Return (%)': HISTORICAL_METRICS[a].ret,
        'Historical Volatility (%)': HISTORICAL_METRICS[a].vol
      })), [cmaReturns]);

      const stressRows = useMemo(() => {
        const rows = [];
        allProfiles.forEach(profile => {
          const w = getProfileWeights(profile);
          STRESS_SCENARIOS.forEach(s => {
            const row = { Profile: profile, Scenario: s.title, Period: s.subtitle };
            let total = 0;
            ASSETS.forEach((a, i) => {
              const contrib = (w[i] / 100) * s.rets[i];
              total += contrib;
              row[`${ASSET_LABELS[a]} Return (%)`] = s.rets[i];
              row[`${ASSET_LABELS[a]} Contribution (%)`] = contrib;
            });
            row['Portfolio Return (%)'] = total;
            rows.push(row);
          });
        });
        return rows;
      }, [allProfiles, getProfileWeights]);

      const correlationRows = useMemo(() => ASSETS.map((a, i) => {
        const row = { Asset: ASSET_LABELS[a] };
        ASSETS.forEach((b, j) => row[ASSET_LABELS[b]] = correlationMatrix[i][j]);
        return row;
      }), [correlationMatrix]);

      const handleCashChange = val => {
        const num = parseFloat(val) || 0;
        const delta = num - otherReturns.cash;
        setOtherReturns(p => ({ ...p, cash: num }));
        const newFi = { ...fiDecomposition };
        Object.keys(newFi).forEach(k => newFi[k] = { ...newFi[k], rf: Number((newFi[k].rf + delta).toFixed(2)) });
        setFiDecomposition(newFi);
      };
      const handleDecompChange = (type, asset, field, val) => {
        const num = parseFloat(val) || 0;
        if (type === 'fi') setFiDecomposition(p => ({ ...p, [asset]: { ...p[asset], [field]: num } }));
        else setEqDecomposition(p => ({ ...p, [asset]: { ...p[asset], [field]: num } }));
      };
      const handleCorrChange = (i, j, val) => {
        const num = parseFloat(val);
        if (isNaN(num) || num < -1 || num > 1) return;
        setCorrelationOverrides(p => ({ ...p, [`${i}-${j}`]: num }));
      };
      const normalizeCustomWeights = () => {
        const total = customWeights.reduce((a, b) => a + b, 0);
        if (total <= 0) return;
        const normalized = customWeights.map(w => Number(((w / total) * 100).toFixed(2)));
        const drift = 100 - normalized.reduce((a,b)=>a+b,0);
        normalized[normalized.length - 1] = Number((normalized[normalized.length - 1] + drift).toFixed(2));
        setCustomWeights(normalized);
      };
      const resetAll = () => {
        setFiDecomposition(INITIAL_FI_DECOMPOSITION);
        setEqDecomposition(INITIAL_EQ_DECOMPOSITION);
        setOtherReturns(BASE_RETURNS_OTHER);
        setCorrelationOverrides({});
        setDynBaseProfile('Balanced');
        setDynTargetRet(calcReturn(BASE_PROFILES.Balanced));
        setDynTargetVol(calcVol(BASE_PROFILES.Balanced));
        setCustomWeights(Array(9).fill(Number((100 / 9).toFixed(2))));
        setSimProfile('Balanced');
        setSimCapital(1000000);
        setSimPaths(1000);
      };

      const handleExportPDF = () => {
        if (!window.html2pdf) {
          alert('PDF export library is not available in this environment.');
          return;
        }
        setIsExportingPDF(true);
        const element = document.getElementById('export-container');
        element.classList.add('pdf-printing');
        const opt = {
          margin: 0.2,
          filename: `BTG_Portfolio_Allocation_${activeTab}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, logging: false },
          jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' }
        };
        setTimeout(() => {
          window.html2pdf().set(opt).from(element).save().finally(() => {
            element.classList.remove('pdf-printing');
            setIsExportingPDF(false);
          });
        }, 100);
      };

      const handleExportExcel = () => {
        setIsExportingExcel(true);
        try {
          if (!window.XLSX) throw new Error('XLSX library unavailable');
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allocationRows), 'Allocation Matrix');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cmaRows), 'CMA Summary');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(correlationRows), 'Correlations');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stressRows), 'Stress Tests');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(simData), 'Simulation Percentiles');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(backtestData), 'Backtest');
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(drawdownData), 'Drawdown');
          const metadata = [{
            'Selected Simulation Profile': simProfile,
            'Initial Capital': simCapital,
            'Simulation Paths': simPaths,
            'Dynamic Base Profile': dynBaseProfile,
            'Dynamic Target Return (%)': dynTargetRet,
            'Dynamic Target Volatility (%)': dynTargetVol,
            'Export Timestamp': new Date().toISOString(),
            'Methodology Note': 'Illustrative browser-side allocation engine. Stress scenarios and simulations are for analytical training and internal discussion, not an investment recommendation.'
          }];
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(metadata), 'Metadata');
          XLSX.writeFile(wb, `BTG_Portfolio_Allocation_Lab_${new Date().toISOString().slice(0,10)}.xlsx`);
        } catch (e) {
          alert('Excel export failed. The XLSX export library is not available in this environment.');
          console.error(e);
        } finally {
          setTimeout(() => setIsExportingExcel(false), 500);
        }
      };

      const renderDashboard = () => {
        const profiles = Object.keys(BASE_PROFILES);
        const selectedWeights = getProfileWeights(simProfile);
        const selectedRet = calcReturn(selectedWeights);
        const selectedVol = calcVol(selectedWeights);
        const selectedSharpe = selectedVol === 0 ? 0 : selectedRet / selectedVol;
        const compData = allProfiles.map(pName => {
          const w = getProfileWeights(pName);
          const item = { name: pName };
          ASSETS.forEach((a, i) => item[a] = (w[i] / 100) * Math.max(0, cmaReturns[a]));
          return item;
        });
        const frontierData = allProfiles.map(pName => {
          const w = getProfileWeights(pName);
          return { name: pName, ret: calcReturn(w), vol: calcVol(w) };
        });

        const renderAssetRow = (asset, idx, isHighlighted = false) => {
          const trClass = isHighlighted ? 'bg-slate-50 hover:bg-slate-100' : 'bg-white hover:bg-slate-50';
          const tdStickyClass = isHighlighted ? 'bg-slate-50' : 'bg-white';
          return (
            <tr key={asset} className={`transition-colors ${trClass}`}>
              <td className={`p-3 border-b border-slate-100 font-medium text-slate-700 sticky left-0 z-10 ${tdStickyClass}`}>
                <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full mr-2" style={{ backgroundColor: COLORS[asset] }}></span>{ASSET_LABELS[asset]}</div>
              </td>
              {profiles.map(p => <td key={p} className="p-2 border-b border-slate-100 text-center text-slate-600">{BASE_PROFILES[p][idx].toFixed(1)}</td>)}
              <td className="p-2 border-b border-slate-100 text-center bg-blue-50 border-l border-blue-200 font-semibold btg-text-primary">{dynWeights[idx].toFixed(1)}</td>
              <td className="p-2 border-b border-slate-100 text-center bg-slate-100 border-l border-slate-300">
                <input type="number" step="0.1" className="w-16 text-center border border-slate-200 rounded p-1 text-xs bg-white" value={customWeights[idx]} onChange={e => { const newW = [...customWeights]; newW[idx] = parseFloat(e.target.value) || 0; setCustomWeights(newW); }} />
              </td>
            </tr>
          );
        };
        const renderSubtotalRow = (label, indices) => {
          const getSum = arr => indices.reduce((sum, idx) => sum + arr[idx], 0);
          return (
            <tr key={label} className="bg-slate-100 font-bold text-xs text-slate-700 border-b-2 border-slate-200">
              <td className="p-3 sticky left-0 bg-slate-100 z-10"><span className="ml-6 uppercase tracking-wider text-[10px] text-slate-500">{label}</span></td>
              {profiles.map(p => <td key={p} className="p-2 text-center text-slate-600">{getSum(BASE_PROFILES[p]).toFixed(1)}%</td>)}
              <td className="p-2 text-center bg-blue-100 border-l border-blue-200 btg-text-primary">{getSum(dynWeights).toFixed(1)}%</td>
              <td className="p-2 text-center bg-slate-200 border-l border-slate-300 text-slate-600">{getSum(customWeights).toFixed(1)}%</td>
            </tr>
          );
        };

        return (
          <div className="space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <MetricCard label="Selected Portfolio" value={simProfile} sub="Used in simulation and stress tests" />
              <MetricCard label="Expected Return" value={fmtPct(selectedRet)} sub="CMA-based nominal return" tone="green" />
              <MetricCard label="Volatility" value={fmtPct(selectedVol)} sub="Correlation-adjusted historical vol" tone="purple" />
              <MetricCard label="Return / Vol" value={selectedSharpe.toFixed(2)} sub="Simple risk-efficiency metric" />
            </div>

            <Card className="overflow-hidden">
              <div className="flex flex-col lg:flex-row justify-between gap-4 mb-6">
                <div>
                  <h3 className="text-lg font-bold btg-text-primary">Interactive Allocation Matrix</h3>
                  <p className="text-sm text-slate-500">Profile weights, dynamic target optimizer, custom column, expected return, and volatility.</p>
                </div>
                <div className="flex gap-2 no-print">
                  <button onClick={normalizeCustomWeights} className="px-3 py-2 rounded-lg bg-slate-100 border border-slate-200 text-xs font-semibold text-slate-700">Normalize Custom</button>
                  <button onClick={resetAll} className="px-3 py-2 rounded-lg bg-white border border-slate-200 text-xs font-semibold text-slate-700 flex items-center gap-1"><Icon path={I_Reset} size={14}/>Reset</button>
                </div>
              </div>

              <div className="overflow-x-auto no-scrollbar pb-4">
                <table className="w-full text-sm border-collapse min-w-[900px]">
                  <thead>
                    <tr>
                      <th className="p-3 border-b border-slate-200 text-left bg-slate-50 text-slate-600 sticky left-0 z-10 w-48">Asset Class</th>
                      {profiles.map(p => <th key={p} className="p-3 border-b border-slate-200 text-center text-slate-600">{p}</th>)}
                      <th className="p-3 border-b border-slate-200 text-center bg-blue-50 border-l border-blue-200 w-44">
                        <div className="flex flex-col items-center">
                          <span className="font-bold btg-text-primary mb-1">Dynamic Target</span>
                          <select className="text-xs p-1 border rounded bg-white w-full outline-none" value={dynBaseProfile} onChange={e => {
                            const newProfile = e.target.value;
                            setDynBaseProfile(newProfile);
                            setDynTargetRet(calcReturn(BASE_PROFILES[newProfile]));
                            setDynTargetVol(calcVol(BASE_PROFILES[newProfile]));
                            setLastActiveConstraint('ret');
                          }}>
                            {profiles.map(p => <option key={p} value={p}>Base: {p}</option>)}
                          </select>
                        </div>
                      </th>
                      <th className="p-3 border-b border-slate-200 text-center bg-slate-100 border-l border-slate-300 w-32">Custom</th>
                    </tr>
                  </thead>
                  <tbody>
                    {ASSETS.slice(0, 4).map((asset, i) => renderAssetRow(asset, i))}
                    {renderSubtotalRow('Total Fixed Income', [0, 1, 2, 3])}
                    {ASSETS.slice(4, 7).map((asset, i) => renderAssetRow(asset, i + 4))}
                    {renderSubtotalRow('Total Equities', [4, 5, 6])}
                    {renderAssetRow('alts', 7, true)}
                    {renderAssetRow('cash', 8, true)}
                    <tr className="bg-slate-100 font-semibold text-xs border-t-2 border-slate-300">
                      <td className="p-3 sticky left-0 bg-slate-100">Total Weight</td>
                      {profiles.map(p => <td key={p} className="text-center p-2 text-slate-500">{BASE_PROFILES[p].reduce((a,b)=>a+b,0).toFixed(1)}%</td>)}
                      <td className="text-center p-2 bg-blue-100 border-l border-white btg-text-primary">{dynWeights.reduce((a,b)=>a+b,0).toFixed(1)}%</td>
                      <td className={`text-center p-2 border-l border-white ${Math.abs(customWeights.reduce((a,b)=>a+b,0) - 100) > 0.1 ? 'text-red-600' : 'text-slate-600'}`}>{customWeights.reduce((a,b)=>a+b,0).toFixed(1)}%</td>
                    </tr>
                    <tr className="bg-white font-bold text-xs">
                      <td className="p-3 sticky left-0 bg-white">Total Exp. Return</td>
                      {profiles.map(p => <td key={p} className="text-center p-2 text-green-700">{fmtPct(calcReturn(BASE_PROFILES[p]))}</td>)}
                      <td className="text-center p-2 bg-blue-50 border-l border-blue-200 text-green-700">{fmtPct(calcReturn(dynWeights))}</td>
                      <td className="text-center p-2 bg-slate-50 border-l border-slate-200 text-green-700">{fmtPct(calcReturn(customWeights))}</td>
                    </tr>
                    <tr className="bg-slate-50 font-bold text-xs border-b border-slate-200">
                      <td className="p-3 sticky left-0 bg-slate-50">Total Volatility</td>
                      {profiles.map(p => <td key={p} className="text-center p-2 text-purple-700">{fmtPct(calcVol(BASE_PROFILES[p]))}</td>)}
                      <td className="text-center p-2 bg-blue-50 border-l border-blue-200 text-purple-700">{fmtPct(calcVol(dynWeights))}</td>
                      <td className="text-center p-2 bg-slate-50 border-l border-slate-200 text-purple-700">{fmtPct(calcVol(customWeights))}</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div className="mt-5 p-4 bg-blue-50/60 rounded-xl border border-blue-100 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="flex justify-between text-xs font-bold btg-text-primary mb-2"><span>Target Expected Return</span><span>{fmtPct(dynTargetRet)}</span></label>
                  <input type="range" min="3" max="10" step="0.1" value={dynTargetRet} onChange={e => { setDynTargetRet(Number(e.target.value)); setLastActiveConstraint('ret'); }} className="w-full" />
                </div>
                <div>
                  <label className="flex justify-between text-xs font-bold text-purple-800 mb-2"><span>Target Volatility Limit</span><span>{fmtPct(dynTargetVol)}</span></label>
                  <input type="range" min="2" max="18" step="0.1" value={dynTargetVol} onChange={e => { setDynTargetVol(Number(e.target.value)); setLastActiveConstraint('vol'); }} className="w-full" />
                </div>
              </div>
            </Card>

            <Card>
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <div>
                  <h3 className="text-xl font-bold btg-text-primary">Forward Simulation Engine</h3>
                  <p className="text-sm text-slate-500 mt-1">Block-bootstrap simulation using empirical-style monthly asset returns and editable correlations.</p>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 no-print">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 mb-1">Portfolio</label>
                    <select className="text-sm p-2 border border-slate-200 rounded-lg bg-slate-50 w-full sm:w-40 outline-none" value={simProfile} onChange={e => setSimProfile(e.target.value)}>{allProfiles.map(p => <option key={p} value={p}>{p}</option>)}</select>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 mb-1">Initial Capital</label>
                    <input type="number" className="text-sm p-2 border border-slate-200 rounded-lg bg-slate-50 w-full sm:w-36 outline-none" value={simCapital} onChange={e => setSimCapital(Number(e.target.value))} />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 mb-1">Paths</label>
                    <select className="text-sm p-2 border border-slate-200 rounded-lg bg-slate-50 w-full sm:w-28 outline-none" value={simPaths} onChange={e => setSimPaths(Number(e.target.value))}>
                      {[500, 1000, 2000].map(x => <option key={x} value={x}>{x}</option>)}
                    </select>
                  </div>
                </div>
              </div>
              <SimpleLineChart
                data={simData}
                xKey="month"
                height={410}
                areaBand={{ high: 'p95', low: 'p5', fill: '#cbd5e1' }}
                lines={[
                  { key: 'p50', name: 'Median Path', color: '#0B2859', width: 3 },
                  { key: 'p95', name: 'Upper Bound', color: '#94a3b8', dash: '6 5' },
                  { key: 'p5', name: 'Lower Bound', color: '#94a3b8', dash: '6 5' }
                ]}
                yFormatter={v => `$${(v/1000).toFixed(0)}k`}
                xFormatter={v => v % 12 === 0 ? `Yr ${v/12}` : ''}
              />
            </Card>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
              <Card>
                <h3 className="text-lg font-bold btg-text-primary mb-1">Historical Backtest</h3>
                <p className="text-xs text-slate-500 mb-4">Synthetic 10-year cumulative value path for selected profile.</p>
                <SimpleLineChart data={backtestData} xKey="year" height={240} lines={[{ key: 'value', name: 'Portfolio Value', color: '#0B2859', width: 3 }]} yFormatter={v => v.toFixed(1)} xFormatter={v => Math.round(v)} />
                <div className="mt-4">
                  <SimpleAreaChart data={drawdownData} xKey="month" yKey="drawdown" height={170} xFormatter={v => v} />
                </div>
              </Card>
              <Card>
                <h3 className="text-lg font-bold btg-text-primary mb-1">Risk Efficiency Frontier</h3>
                <p className="text-xs text-slate-500 mb-4">Expected return versus correlation-adjusted volatility.</p>
                <SimpleScatterChart data={frontierData} />
              </Card>
            </div>

            <Card>
              <h3 className="text-xl font-bold btg-text-primary mb-1">Historical Stress Test Matrix</h3>
              <p className="text-sm text-slate-500 mb-6">Portfolio impact reconstructed from per-asset realized returns during severe market dislocations.</p>
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                {STRESS_SCENARIOS.map(scenario => {
                  const w = getProfileWeights(simProfile);
                  let totalRet = 0;
                  ASSETS.forEach((a, i) => totalRet += (w[i] / 100) * scenario.rets[i]);
                  const isNegative = totalRet < 0;
                  return (
                    <div key={scenario.id} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white">
                      <div className={`px-5 py-4 flex justify-between items-center ${isNegative ? 'bg-red-700' : 'bg-green-700'} text-white`}>
                        <div><h4 className="font-bold text-lg leading-tight">{scenario.title}</h4><p className="text-xs text-white/80 mt-1">{scenario.subtitle}</p></div>
                        <div className="text-3xl font-extrabold">{totalRet > 0 ? '+' : ''}{fmtPct(totalRet)}</div>
                      </div>
                      <div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-slate-50 text-slate-500 border-b"><tr><th className="p-3 font-semibold">Asset</th><th className="p-3 font-semibold text-right">Weight</th><th className="p-3 font-semibold text-right">Asset Ret.</th><th className="p-3 font-semibold text-right">Contrib.</th></tr></thead><tbody>{ASSETS.map((asset, i) => { const weight = w[i]; const assetRet = scenario.rets[i]; const contrib = (weight / 100) * assetRet; return <tr key={asset} className="border-b border-slate-100 last:border-0 hover:bg-slate-50"><td className="p-3 text-slate-700 font-medium">{ASSET_LABELS[asset]}</td><td className="p-3 text-right text-slate-600">{weight.toFixed(1)}%</td><td className={`p-3 text-right font-medium ${assetRet < 0 ? 'text-red-600' : assetRet > 0 ? 'text-green-600' : 'text-slate-600'}`}>{assetRet > 0 ? '+' : ''}{fmtPct(assetRet)}</td><td className={`p-3 text-right font-bold ${contrib < 0 ? 'text-red-600' : contrib > 0 ? 'text-green-600' : 'text-slate-600'}`}>{contrib > 0 ? '+' : ''}{fmtPct(contrib)}</td></tr>; })}</tbody></table></div>
                    </div>
                  );
                })}
              </div>
            </Card>

            <Card>
              <h3 className="text-lg font-bold btg-text-primary mb-4">Return Composition Analysis</h3>
              <SimpleStackedBar data={compData} keys={ASSETS} height={350} />
            </Card>
          </div>
        );
      };

      const renderAssumptions = () => (
        <div className="space-y-6">
          <Card>
            <h3 className="text-lg font-bold btg-text-primary mb-1">Capital Market Assumptions</h3>
            <p className="text-sm text-slate-500 mb-4">Editable return assumptions propagate to the allocation engine and Excel export.</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              {[ASSETS.slice(0, 5), ASSETS.slice(5)].map((group, idx) => (
                <table key={idx} className="w-full text-sm">
                  <thead><tr className="border-b border-slate-200 text-slate-600"><th className="text-left py-2">Asset Class</th><th className="text-right py-2">Exp. Return</th><th className="text-right py-2">Hist. Vol</th></tr></thead>
                  <tbody>{group.map(a => {
                    const isEditable = a === 'cash' || a === 'alts';
                    return <tr key={a} className="border-b border-slate-100 last:border-0 hover:bg-slate-50"><td className="py-3 font-medium flex items-center"><span className="w-2 h-2 rounded-full mr-2" style={{ backgroundColor: COLORS[a] }}></span>{ASSET_LABELS[a]}</td><td className="py-3 text-right">{isEditable ? <input type="number" step="0.1" className="w-16 text-right bg-blue-50 border border-blue-200 rounded p-1 font-bold text-blue-700 outline-none" value={otherReturns[a]} onChange={e => a === 'cash' ? handleCashChange(e.target.value) : setOtherReturns(p => ({ ...p, [a]: parseFloat(e.target.value) || 0 }))}/> : <span className="font-bold text-slate-700">{fmtPct(cmaReturns[a])}</span>}</td><td className="py-3 text-right text-slate-500">{fmtPct(HISTORICAL_METRICS[a].vol)}</td></tr>;
                  })}</tbody>
                </table>
              ))}
            </div>
          </Card>

          <Card>
            <h3 className="text-lg font-bold btg-text-primary mb-4">Return Attribution Building Blocks</h3>
            <div className="space-y-8">
              <div>
                <h4 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2">Fixed Income</h4>
                <div className="overflow-x-auto"><table className="w-full text-xs"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-2 text-left">Asset</th><th className="p-2 text-right">Risk Free</th><th className="p-2 text-right">Spread</th><th className="p-2 text-right">Roll</th><th className="p-2 text-right">Val(RF)</th><th className="p-2 text-right">Val(Spr)</th><th className="p-2 text-right">Default</th><th className="p-2 text-right font-bold">Total</th></tr></thead><tbody>{Object.keys(fiDecomposition).map(key => { const d = fiDecomposition[key]; const total = d.rf + d.spread + d.roll + d.val_rf + d.val_spr + d.def; return <tr key={key} className="border-b border-slate-100 hover:bg-slate-50"><td className="p-2 font-medium text-slate-700">{ASSET_LABELS[key]}</td><td className="p-2 text-right">{key === 'dev_sov' ? <input type="number" step="0.1" className="w-12 text-right bg-transparent border-b border-slate-300 outline-none" value={d.rf} onChange={e => handleCashChange(e.target.value)}/> : <span className="text-slate-500">{d.rf.toFixed(2)}</span>}</td>{['spread','roll','val_rf','val_spr','def'].map(field => <td key={field} className="p-2 text-right"><input type="number" step="0.05" className="w-12 text-right bg-transparent border-b border-slate-200 outline-none" value={d[field]} onChange={e => handleDecompChange('fi', key, field, e.target.value)}/></td>)}<td className="p-2 text-right font-bold bg-slate-50">{fmtPct(total)}</td></tr>; })}</tbody></table></div>
              </div>
              <div>
                <h4 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2">Equities</h4>
                <div className="overflow-x-auto"><table className="w-full text-xs"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-2 text-left">Asset</th><th className="p-2 text-right">Div. Yield</th><th className="p-2 text-right">Real Earnings</th><th className="p-2 text-right">Inflation</th><th className="p-2 text-right">Valuation</th><th className="p-2 text-right">FX</th><th className="p-2 text-right font-bold">Total</th></tr></thead><tbody>{Object.keys(eqDecomposition).map(key => { const d = eqDecomposition[key]; const total = d.div + d.earnings + d.inflation + d.val + d.fx; return <tr key={key} className="border-b border-slate-100 hover:bg-slate-50"><td className="p-2 font-medium text-slate-700">{ASSET_LABELS[key]}</td>{['div','earnings','inflation','val','fx'].map(field => <td key={field} className="p-2 text-right"><input type="number" step="0.05" className="w-12 text-right bg-transparent border-b border-slate-200 outline-none" value={d[field]} onChange={e => handleDecompChange('eq', key, field, e.target.value)}/></td>)}<td className="p-2 text-right font-bold bg-slate-50">{fmtPct(total)}</td></tr>; })}</tbody></table></div>
              </div>
            </div>
          </Card>

          <Card className="overflow-x-auto">
            <h3 className="text-lg font-bold btg-text-primary mb-1">Correlation Matrix</h3>
            <p className="text-sm text-slate-500 mb-4">Editable matrix used in portfolio volatility and simulation. Values must remain between -1 and 1.</p>
            <table className="w-full text-xs border-collapse min-w-[900px]">
              <thead><tr><th className="p-2 border bg-slate-50"></th>{ASSETS.map(k => <th key={k} className="p-2 border bg-slate-50 text-slate-600 font-normal">{k.toUpperCase().substring(0,4)}</th>)}</tr></thead>
              <tbody>{ASSETS.map((rowKey, i) => <tr key={rowKey}><td className="p-2 border font-bold bg-slate-50 text-slate-600">{rowKey.toUpperCase().substring(0,4)}</td>{ASSETS.map((colKey, j) => <td key={colKey} className={`p-2 border text-center ${i === j ? 'bg-slate-100 text-slate-300' : ''}`}>{i === j ? '1.0' : <input type="number" step="0.05" max="1" min="-1" className="w-full text-center bg-transparent outline-none focus:text-blue-700 focus:font-bold" value={correlationMatrix[i][j]} onChange={e => handleCorrChange(i, j, e.target.value)}/>}</td>)}</tr>)}</tbody>
            </table>
          </Card>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col overflow-x-hidden">
          <header className="btg-bg-primary text-white flex items-center justify-between px-6 py-4 shadow-md z-20 shrink-0">
            <div className="flex items-center gap-4 min-w-0">
              <div className="font-extrabold text-xl tracking-tight border-r border-white/25 pr-4 whitespace-nowrap">BTG Pactual</div>
              <div className="hidden md:block"><h1 className="text-base font-bold tracking-tight">Portfolio Allocation Lab</h1><p className="text-xs text-slate-300">Allocation matrix, assumptions, stress testing, simulation, PDF and Excel export</p></div>
            </div>
            <div className="flex items-center gap-2 no-print">
              <button onClick={handleExportExcel} disabled={isExportingExcel} className="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors text-sm font-semibold disabled:opacity-50">
                <Icon path={I_FileSpreadsheet} size={16}/><span>{isExportingExcel ? 'Exporting...' : 'Download Excel'}</span>
              </button>
              <button onClick={handleExportPDF} disabled={isExportingPDF} className="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2 rounded-lg transition-colors text-sm font-semibold disabled:opacity-50">
                <Icon path={I_Download} size={16}/><span>{isExportingPDF ? 'Generating...' : 'Export PDF'}</span>
              </button>
            </div>
          </header>

          <div className="bg-white border-b border-slate-200 px-6 flex gap-6 text-sm font-medium shrink-0 shadow-sm z-10 overflow-x-auto no-scrollbar no-print">
            <TabButton active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={I_Layout}>Allocation Matrix & Simulations</TabButton>
            <TabButton active={activeTab === 'assumptions'} onClick={() => setActiveTab('assumptions')} icon={I_Settings}>Assumptions & Correlations</TabButton>
          </div>

          <main id="export-container" className="flex-1 p-6 max-w-screen-2xl mx-auto w-full transition-all">
            {activeTab === 'dashboard' && renderDashboard()}
            {activeTab === 'assumptions' && renderAssumptions()}
            <div className="mt-6 text-xs text-slate-500 border-t border-slate-200 pt-4">
              Methodology note: this is an illustrative browser-side allocation tool. Outputs depend on user-edited assumptions, simplified stress scenarios, simulated paths, and static asset-class inputs. Use for internal analysis and discussion, not as an investment recommendation.
            </div>
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
